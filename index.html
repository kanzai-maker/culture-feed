<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>🚀CULTURE SEED✨ - 第二東京CC</title>
  <style>
    :root {
      --orange: #ff8c1a;
      --glass: rgba(255, 255, 255, 0.1);
      --input-bg: rgba(0, 0, 0, 0.8);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0; background: #010208; color: #fff;
      font-family: "Inter", "Noto Sans JP", sans-serif;
      overflow-x: hidden; min-height: 100vh;
    }

    /*背景演出：維持*/
    .galaxy-container {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: 
        radial-gradient(circle at 15% 20%, rgba(120, 40, 200, 0.4), transparent 60%),
        radial-gradient(circle at 85% 80%, rgba(20, 80, 180, 0.3), transparent 60%),
        radial-gradient(ellipse at 50% 40%, rgba(180, 60, 40, 0.2), transparent 70%),
        url('https://www.transparenttextures.com/patterns/stardust.png');
    }
    .twinkle-star { position: absolute; border-radius: 50%; opacity: 0; animation: twinkle var(--d) ease-in-out infinite; }
    @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.5); } }

    /* 右上から左下へ流れる流れ星のアニメーション */
    .shooting-star { 
      position: absolute; top: -50px; width: 1px; height: 1px; border-radius: 50%; opacity: 0;
      animation: shoot var(--d) linear infinite;
    }
    @keyframes shoot {
      0% { transform: translate(100vw, 0) rotate(135deg); opacity: 1; }
      100% { transform: translate(-50px, calc(100vh + 50px)) rotate(135deg); opacity: 0.2; }
    }

    /* 修正：右下の常時表示デコレーション用スタイル */
    #rightBottomDeco {
      position: fixed; bottom: 10px; right: 10px; width: 300px; height: 220px;
      pointer-events: none; z-index: 5;
    }
    .floating-item { position: absolute; }
    
    /* UFO用アニメーション（大きく動かす） */
    @keyframes floatUfoBig { 0%, 100% { transform: translate(0, 0) rotate(-3deg); } 50% { transform: translate(15px, -20px) rotate(3deg); } }
    @keyframes floatUfoSmall { 0%, 100% { transform: translate(0, 0) rotate(5deg); } 50% { transform: translate(-10px, 10px) rotate(-5deg); } }
    
    /* 宇宙人用アニメーション（大小さまざまに動かす） */
    @keyframes floatAlien1 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-15px, 20px); } }
    @keyframes floatAlien2 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(20px, 15px); } }
    @keyframes floatAlien3 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-10px, -15px); } }
    @keyframes floatAlien4 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(15px, -10px); } }
    @keyframes floatAlien5 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-20px, 10px); } }
    @keyframes floatAlien6 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(10px, 20px); } }

    /* Thanks演出 */
    .thanks-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 6rem; font-weight: 900; color: #fffde7; text-shadow: 0 0 50px #ffd700; z-index: 10000; pointer-events: none; animation: thanksFade 2.5s forwards; }
    @keyframes thanksFade { 0% { opacity: 0; scale: 0.5; } 20% { opacity: 1; scale: 1.2; } 100% { opacity: 0; transform: translate(-50%, -70%); scale: 1; } }
    .particle { position: fixed; pointer-events: none; z-index: 9999; animation: particle-move 2s ease-out forwards; }
    @keyframes particle-move { 0% { opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) rotate(var(--tr)); opacity: 0; } }

    .container { width: 94%; max-width: 1250px; margin: 0 auto; position: relative; z-index: 10; padding-bottom: 80px; }
    header { text-align: center; padding: 30px 0 20px; }
    .main-title { font-size: clamp(2.8rem, 9vw, 5rem); font-weight: 900; letter-spacing: 8px; text-shadow: 0 0 40px var(--orange); margin: 0; }
    .emoji-growth { font-size: 2rem; margin-top: 10px; letter-spacing: 15px; }

    .grid { display: grid; grid-template-columns: 1fr 420px; gap: 30px; }
    @media (max-width: 1100px) { .grid { grid-template-columns: 1fr; } }

    .panel { background: var(--glass); border: 1px solid rgba(255,255,255,0.15); border-radius: 32px; padding: 30px; margin-bottom: 30px; backdrop-filter: blur(25px); }

    /* ソートボタン */
    .sort-area { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .sort-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px 18px; border-radius: 20px; cursor: pointer; font-size: 13px; }
    .sort-btn.active { background: var(--orange); color: #000; font-weight: bold; }

    /* Seed Box */
    #feedList { max-height: 800px; overflow-y: auto; padding-right: 15px; scrollbar-width: thin; scrollbar-color: var(--orange) transparent; }
    .post-card { background: rgba(255,255,255,0.08); border-radius: 25px; padding: 25px; margin-bottom: 25px; border-left: 8px solid var(--orange); position: relative; }
    .post-header-info { font-size: 22px; font-weight: bold; margin-bottom: 10px; }
    .post-category-label { color: var(--orange); font-size: 22px; font-weight: 900; margin-bottom: 12px; display: block; }

    textarea, select, input[type="text"] { width: 100%; background: var(--input-bg); border: 1px solid #555; color: white; padding: 15px; border-radius: 12px; margin-top: 8px; font-size: 16px; outline: none; }
    .btn-post { width: 100%; padding: 22px; background: linear-gradient(135deg, var(--orange), #ffcc80); color: #000; font-weight: 900; border: none; border-radius: 18px; cursor: pointer; margin-top: 30px; font-size: 22px; }

    .values-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 15px; margin: 10px 0; }
    .value-item { display: flex; align-items: center; font-size: 13px; cursor: pointer; }
    .value-item input { width: 18px; height: 18px; margin-right: 8px; accent-color: var(--orange); }

    .edit-trigger { background: transparent; border: 1px solid rgba(255,255,255,0.3); color: #aaa; font-size: 11px; padding: 4px 8px; border-radius: 8px; cursor: pointer; margin-left: 10px; }
    .edit-trigger:hover { color: var(--orange); border-color: var(--orange); }
  </style>
</head>
<body>

<div class="galaxy-container"></div>
<div id="starField"></div>
<div id="rightBottomDeco">
  <div class="floating-item" style="font-size: 120px; left: 0px; top: -30px; z-index: 10; animation: floatUfoBig 7s ease-in-out infinite;">🛸</div>
  <div class="floating-item" style="font-size: 50px; left: 180px; top: 10px; z-index: 5; animation: floatUfoSmall 8s ease-in-out infinite;">🛸</div>
  
  <div class="floating-item" style="font-size: 35px; left: 100px; top: 110px; color: #b39ddb; z-index: 15; animation: floatAlien1 9s ease-in-out infinite;">👾</div>
  <div class="floating-item" style="font-size: 50px; left: 210px; top: 90px; color: #64ffda; z-index: 15; animation: floatAlien2 10s ease-in-out infinite;">👾</div>
  <div class="floating-item" style="font-size: 25px; left: 160px; top: 140px; color: #f8bbd0; z-index: 15; animation: floatAlien3 11s ease-in-out infinite;">👾</div>
  <div class="floating-item" style="font-size: 40px; left: 60px; top: 160px; color: #a5d6a7; z-index: 15; animation: floatAlien4 12s ease-in-out infinite;">👾</div>
  <div class="floating-item" style="font-size: 30px; left: 190px; top: 170px; color: #ef9a9a; z-index: 15; animation: floatAlien5 13s ease-in-out infinite;">👾</div>
  <div class="floating-item" style="font-size: 45px; left: 130px; top: 190px; color: #fff59d; z-index: 15; animation: floatAlien6 14s ease-in-out infinite;">👾</div>
</div>

<div class="container">
  <header>
    <h1 class="main-title">🚀CULTURE SEED✨</h1>
    <div class="sub-title">文化を醸成中...</div>
    <div class="emoji-growth">🫘 → 🌱 → 🌼</div>
  </header>

  <div class="grid">
    <main>
      <section class="panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
          <h2 style="margin:0;">Seed Box</h2>
          <select id="archiveSelect" style="width:auto; height:40px; border-radius:20px; border:1px solid var(--orange); background:#000; color:var(--orange); padding:0 10px;">
          </select>
        </div>
        <div class="sort-area">
          <button class="sort-btn active" id="sort-new" onclick="setSort('new')">✨ 新着順</button>
          <button class="sort-btn" id="sort-stamp" onclick="setSort('stamp')">🔥 スタンプ順</button>
          <button class="sort-btn" id="sort-comment" onclick="setSort('comment')">💬 コメント順</button>
        </div>
        <div id="feedList">同期中...</div>
      </section>

      <section class="panel">
        <h2 style="margin-top:0;">Sow Seeds</h2>
        <form id="cultureForm">
          <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
            <div><label>From</label><select id="fromName" required></select></div>
            <div><label>To</label><select id="toName"></select></div>
          </div>
          <div style="margin-top:15px;">
            <label>項目選択</label>
            <select id="category">
              <option value="🤝 Thanks">🤝 Thanks</option>
              <option value="💰 商売を展開、商売を心から楽しむ">💰 商売を展開、商売を心から楽しむ</option>
              <option value="🔥 MVVを体現">🔥 MVVを体現</option>
              <option value="💎 主体性の発揮">💎 主体性の発揮</option>
              <option value="✨ 凡事徹底">✨ 凡事徹底</option>
            </select>
          </div>
          <div style="margin-top:15px;">
            <label>10 Core Values (複数選択可)</label>
            <div class="values-grid" id="valuesCheckboxes"></div>
          </div>
          <textarea id="message" rows="5" required style="margin-top:20px;" placeholder="エピソードを入力してください..."></textarea>
          <button type="submit" class="btn-post">投稿を送信</button>
        </form>
      </section>
    </main>

    <aside>
      <section class="panel">
        <h3 style="margin-top:0; color:var(--orange);">トレンド</h3>
        <div id="trendStats" style="font-size:16px; line-height:2.2;"></div>
      </section>
      <section class="panel">
        <h3 style="margin-top:0; color:var(--orange);">今月の投稿してくれた人ランキング</h3>
        <select id="rankArchiveSelect" style="width:100%; height:45px; border-radius:12px; margin-bottom:20px; background:#000; color:var(--orange); border:1px solid var(--orange); padding:0 15px; font-weight:bold;">
        </select>
        <div id="rankingList"></div>
      </section>
    </aside>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, push, onValue, update, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC_2bIvYpfgKrgyfQ9YKE1CykpnxLfQi0k",
    authDomain: "second-cc-culture-feed.firebaseapp.com",
    databaseURL: "https://second-cc-culture-feed-default-rtdb.firebaseio.com",
    projectId: "second-cc-culture-feed",
    storageBucket: "second-cc-culture-feed.firebasestorage.app",
    messagingSenderId: "1042140470022",
    appId: "1:1042140470022:web:8d2a9de18d6d55060f9c87"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const postsRef = ref(db, 'posts');

  const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwJwp6RmsJ1XLB59rVrrmlIkVWTlnLPnpbCmvc0r3Z4Kp9vtw62vQD3FfjOS4kHS3V6uQ/exec";

  const members = ["第二全体", "未選択", "安齋 慶人", "金井 裕之介", "中村 景一郎", "前田 拓真", "庄司 祐亮", "太田 魁晟", "高本 優", "白鳥 拓人", "柳沢 緋里", "和田 翔太郎", "斉藤 直文", "中川 春花", "三登 有夏", "金兒 胤栄", "山﨑 紀史", "茨 陸翔", "古田 大貴", "吉増 海斗"];
  const coreValues = ["Speed 速度", "Change & Challenge 変化と挑戦", "Input & Output 学びと行動", "Priority 優先順位", "Continuous Outcome 継続的成果", "Responsibility 責任感", "Key Communication 本質的議論", "Team Work 共創", "Creativity 発想", "Long-term thinking 長期思考"];
  let rawData = {};
  let sortMode = 'new';

  function generateMonthArchiveOptions() {
    const now = new Date();
    const selects = [document.getElementById('archiveSelect'), document.getElementById('rankArchiveSelect')];
    
    selects.forEach(select => {
      select.innerHTML = "";
      for (let i = 0; i < 3; i++) {
        const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const value = `${year}-${month}`;
        const label = `${year}年${parseInt(month)}月` + (i===0 ? "（今月）" : (i===1 ? "（先月）" : ""));
        
        const option = new Option(label, value);
        select.add(option);
      }
      select.value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
    });
  }
  generateMonthArchiveOptions();

  const f = document.getElementById('fromName'), t = document.getElementById('toName'), vGrid = document.getElementById('valuesCheckboxes');
  members.forEach(m => { f.add(new Option(m, m)); t.add(new Option(m, m)); });
  coreValues.forEach(v => { vGrid.innerHTML += `<label class="value-item"><input type="checkbox" name="cv" value="${v}">${v}</label>`; });

  onValue(postsRef, (s) => { rawData = s.val() || {}; refreshUI(); });

  function refreshUI() {
    const boxMonth = document.getElementById('archiveSelect').value;
    const rankMonth = document.getElementById('rankArchiveSelect').value;
    
    let feedPosts = Object.entries(rawData).map(([id, p]) => ({ id, ...p })).filter(p => p.dateKey === boxMonth);
    if (sortMode === 'stamp') feedPosts.sort((a, b) => (Object.values(b.reactions||{}).reduce((s,c)=>s+c,0)) - (Object.values(a.reactions||{}).reduce((s,c)=>s+c,0)));
    else if (sortMode === 'comment') feedPosts.sort((a, b) => Object.keys(b.replies||{}).length - Object.keys(a.replies||{}).length);
    else feedPosts.reverse();

    renderFeed(feedPosts);
    const rPosts = Object.entries(rawData).map(([id, p]) => ({ id, ...p })).filter(p => p.dateKey === rankMonth);
    renderStats(rPosts);
    renderRanking(rPosts);
  }

  function renderFeed(posts) {
    const fixedReactions = [
      {emoji: "🤝", label: "Thanks"},
      {emoji: "💰", label: "商売"},
      {emoji: "🔥", label: "MVV"},
      {emoji: "💎", label: "主体者"},
      {emoji: "✨", label: "凡事徹底"}
    ];

    document.getElementById('feedList').innerHTML = posts.map(p => `
      <div class="post-card">
        <div class="post-header-info">
          ${p.from} ➔ ${p.to}
          <button class="edit-trigger" onclick="window.editPost('${p.id}')">編集</button>
        </div>
        <span class="post-category-label">${p.category}</span>
        <div style="margin:10px 0; color:var(--orange); font-size:12px;">${p.values ? p.values.map(v=>'#'+v.split(' ')[0]).join(' ') : ''}</div>
        <div id="msg-${p.id}" style="margin:15px 0; font-size:18px; line-height:1.7; white-space:pre-wrap;">${p.message}</div>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          ${fixedReactions.map(fr => {
            const count = (p.reactions && p.reactions[fr.emoji]) ? p.reactions[fr.emoji] : 0;
            return `<button onclick="window.addReaction('${p.id}','${fr.emoji}',${count})" style="background:rgba(255,255,255,0.1); border:none; color:white; padding:8px 16px; border-radius:99px; cursor:pointer; font-size:14px;">${fr.emoji}${fr.label} ${count}</button>`;
          }).join('')}
          <button onclick="window.promptEmoji('${p.id}')" style="background:rgba(255,255,255,0.1); border:none; color:white; padding:8px 16px; border-radius:99px; cursor:pointer;">＋</button>
        </div>
        <div style="margin-top:15px; border-top:1px solid rgba(255,255,255,0.1); padding-top:10px;">
          ${p.replies ? Object.entries(p.replies).map(([rid, r]) => `
            <div style="background:rgba(255,255,255,0.05); padding:8px; border-radius:8px; margin-bottom:5px; font-size:14px; display:flex; justify-content:space-between; align-items:center;">
              <span>${r.text}</span>
              <button class="edit-trigger" onclick="window.editReply('${p.id}','${rid}')" style="margin:0;">編集</button>
            </div>`).join('') : ''}
          <div style="display:flex; gap:10px; margin-top:10px; align-items: center;">
            <input type="text" id="re-${p.id}" placeholder="返信..." style="flex:1; height:45px; font-size:14px; margin:0;">
            <button onclick="window.addReply('${p.id}')" style="background:var(--orange); border:none; border-radius:12px; height:45px; padding:0 25px; color:black; font-weight:bold; cursor:pointer; white-space:nowrap; min-width:80px;">送信</button>
          </div>
        </div>
      </div>
    `).join('') || "種がありません";
  }

  window.editPost = (id) => {
    const newMsg = prompt("投稿内容を編集:", document.getElementById(`msg-${id}`).innerText);
    if(newMsg !== null) update(ref(db, `posts/${id}`), { message: newMsg });
  };

  window.editReply = (pid, rid) => {
    const current = rawData[pid].replies[rid].text;
    const newMsg = prompt("コメントを編集:", current);
    if(newMsg !== null) update(ref(db, `posts/${pid}/replies/${rid}`), { text: newMsg });
  };

  function renderStats(posts) {
    const cats = {"🤝 Thanks":0, "💰 商売を展開、商売を心から楽しむ":0, "🔥 MVVを体現":0, "💎 主体性の発揮":0, "✨ 凡事徹底":0};
    posts.forEach(p => { if(cats[p.category] !== undefined) cats[p.category]++; });
    document.getElementById('trendStats').innerHTML = `<div style="font-size:24px; color:var(--orange); font-weight:bold;">Total: ${posts.length}</div>` + 
      Object.entries(cats).map(([label, count]) => `<div>${label}: ${count}</div>`).join('');
  }

  function renderRanking(posts) {
    const scores = {};
    posts.forEach(p => { 
      const sender = p.from;
      if(sender !== "未選択" && sender !== "第二全体") {
        scores[sender] = (scores[sender] || 0) + 1; 
      }
    });

    const sortedEntries = Object.entries(scores).sort((a,b) => b[1] - a[1]);
    
    let html = "";
    let lastScore = -1;
    let count = 0;
    let rankToDisplay = 0;

    for (let i = 0; i < sortedEntries.length; i++) {
      const [name, score] = sortedEntries[i];
      count++;

      if (score !== lastScore) {
        rankToDisplay = count;
      }
      
      if (rankToDisplay > 5) break;

      const isTie = (i + 1 < sortedEntries.length && sortedEntries[i+1][1] === score) || (score === lastScore);
      let rankLabel = "";
      
      if (rankToDisplay === 1) rankLabel = "🥇1位👑：";
      else if (rankToDisplay === 2) rankLabel = "🥈2位：";
      else if (rankToDisplay === 3) rankLabel = "🥉3位：";
      else rankLabel = `${rankToDisplay}位：`;

      if (isTie) {
        rankLabel = rankLabel.replace("：", "") + "タイ ";
      }
      
      html += `<div style="font-size:20px; padding:15px 0; border-bottom:1px solid rgba(255,255,255,0.1); display:flex; justify-content:space-between;">
                <span>${rankLabel}${name}</span>
                strong>${score} seeds</strong>
              </div>`;
      
      lastScore = score;
    }

    document.getElementById('rankingList').innerHTML = html || "No Data";
  }

  window.setSort = (m) => { sortMode = m; document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active')); document.getElementById(`sort-${m}`).classList.add('active'); refreshUI(); };
  window.addReaction = (id, emoji, count) => update(ref(db, `posts/${id}/reactions`), { [emoji]: count + 1 });
  window.promptEmoji = (id) => { const e = prompt("絵文字を入力:"); if(e) window.addReaction(id, e, 0); };
  window.addReply = (id) => { const t = document.getElementById(`re-${id}`).value; if(t) { push(ref(db, `posts/${id}/replies`), { text: t, timestamp: serverTimestamp() }); document.getElementById(`re-${id}`).value = ""; } };

  async function sendToSpreadsheet(data) {
    if(!GAS_WEBAPP_URL) return;
    try {
      await fetch(GAS_WEBAPP_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });
    } catch (e) { console.error("Sync Error:", e); }
  }

  document.getElementById('cultureForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const checks = Array.from(document.querySelectorAll('input[name="cv"]:checked')).map(c => c.value);
    const now = new Date();
    const dateKey = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
    const displayDate = now.toLocaleString('ja-JP');

    const postData = { 
      from: f.value, 
      to: t.value, 
      category: document.getElementById('category').value, 
      values: checks, 
      message: document.getElementById('message').value, 
      timestamp: serverTimestamp(), 
      dateKey: dateKey 
    };

    push(postsRef, postData)
    .then(() => { 
      sendToSpreadsheet({ 
        type: "post", 
        displayDate: displayDate,
        ...postData,
        values: checks.join(', ')
      });
      e.target.reset(); 
      triggerThanksEffect(); 
    });
  });

  function triggerThanksEffect() {
    const t = document.createElement('div'); t.className = 'thanks-popup'; t.innerText = 'Thanks! ✨';
    document.body.appendChild(t); setTimeout(() => t.remove(), 2500);
    const items = ["🌸", "🌼", "✨", "⭐", "☆"];
    for(let i=0; i<40; i++) {
      const p = document.createElement('div'); p.className = 'particle'; p.innerText = items[Math.floor(Math.random()*items.length)];
      p.style.left = '50%'; p.style.top = '50%';
      p.style.setProperty('--tx', (Math.random()-0.5)*1000+'px'); p.style.setProperty('--ty', (Math.random()-0.5)*1000+'px');
      p.style.setProperty('--tr', Math.random()*720+'deg');
      document.body.appendChild(p); setTimeout(() => p.remove(), 2000);
    }
  }

  document.getElementById('archiveSelect').addEventListener('change', refreshUI);
  document.getElementById('rankArchiveSelect').addEventListener('change', refreshUI);

  const sf = document.getElementById('starField');
  const starColors = ["#ffffff", "#fffde7", "#ffcc80", "#ff5252", "#64ffda", "#448aff", "#f8bbd0"];
  for(let i=0; i<250; i++) {
    const s = document.createElement('div'); s.className = 'twinkle-star';
    s.style.width = s.style.height = (Math.random()*3+1)+'px';
    s.style.left = Math.random()*100+'vw'; s.style.top = Math.random()*150+'vh';
    s.style.background = starColors[Math.floor(Math.random()*starColors.length)];
    s.style.setProperty('--d', (Math.random()*4+2)+'s'); sf.appendChild(s);
  }
  
  setInterval(() => {
    const starItems = ["⭐", "🌟", "✨", "☄", "🪐"];
    const colors = ["#ffffff", "#fffde7", "#ffcc80", "#ff5252", "#64ffda", "#448aff", "#f8bbd0", "#b39ddb", "#ffcc80"];

    const s = document.createElement('div'); 
    s.className = 'shooting-star';
    s.innerText = starItems[Math.floor(Math.random() * starItems.length)];
    s.style.left = (Math.random() * 80 + 20) + 'vw';
    s.style.color = colors[Math.floor(Math.random() * colors.length)];
    s.style.fontSize = (Math.random() * 20 + 10) + 'px';
    s.style.setProperty('--d', (Math.random() * 2 + 3) + 's');

    sf.appendChild(s);
    setTimeout(() => s.remove(), 5500);
  }, 250);
</script>
</body>
</html>
