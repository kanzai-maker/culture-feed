<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CULTURE SEED - 第二東京CC</title>
  <style>
    :root {
      --orange: #ff8c1a;
      --glass: rgba(255, 255, 255, 0.1);
      --input-bg: rgba(0, 0, 0, 0.8);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0; background: #010208; color: #fff;
      font-family: "Inter", "Noto Sans JP", sans-serif;
      overflow-x: hidden; min-height: 100vh;
    }

    /* --- 修正点：豪華な星雲・星間雲・多色銀河背景（下部まで継続） --- */
    .galaxy-container {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: 
        radial-gradient(circle at 15% 20%, rgba(120, 40, 200, 0.4), transparent 60%), /* 星雲 紫 */
        radial-gradient(circle at 85% 80%, rgba(20, 80, 180, 0.3), transparent 60%), /* 星雲 青 */
        radial-gradient(ellipse at 50% 40%, rgba(180, 60, 40, 0.2), transparent 70%), /* 星間雲 赤 */
        url('https://www.transparenttextures.com/patterns/stardust.png');
    }
    .twinkle-star {
      position: absolute; border-radius: 50%; opacity: 0; 
      animation: twinkle var(--d) ease-in-out infinite;
    }
    @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.5); } }
    .shooting-star {
      position: absolute; top: -150px; width: 2px;
      opacity: 0; animation: shoot linear infinite;
    }
    @keyframes shoot {
      0% { transform: translate(100vw, 0) rotate(35deg); opacity: 0; }
      15% { opacity: 1; }
      45% { transform: translate(-20vw, 120vh) rotate(35deg); opacity: 0; }
      100% { opacity: 0; }
    }

    .container { width: 94%; max-width: 1250px; margin: 0 auto; position: relative; z-index: 10; padding-bottom: 80px; }
    header { text-align: center; padding: 30px 0 20px; }
    .main-title { font-size: clamp(2.8rem, 9vw, 5rem); font-weight: 900; letter-spacing: 8px; text-shadow: 0 0 40px var(--orange); margin: 0; }
    .sub-title { opacity: 0.9; font-size: 22px; letter-spacing: 5px; margin-top: 15px; font-weight: bold; color: #fffde7; }
    .emoji-growth { font-size: 2rem; margin-top: 10px; letter-spacing: 15px; }

    .grid { display: grid; grid-template-columns: 1fr 420px; gap: 30px; }
    @media (max-width: 1100px) { .grid { grid-template-columns: 1fr; } }

    .panel {
      background: var(--glass); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 32px; padding: 30px; margin-bottom: 30px; backdrop-filter: blur(25px);
    }

    /* Seed Box エリア（維持） */
    #feedList {
      max-height: 800px; overflow-y: auto; padding-right: 15px;
      scrollbar-width: thin; scrollbar-color: var(--orange) transparent;
    }
    #feedList::-webkit-scrollbar { width: 6px; }
    #feedList::-webkit-scrollbar-thumb { background: var(--orange); border-radius: 10px; }

    .sort-area { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .sort-btn {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3);
      color: white; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 13px;
    }
    .sort-btn.active { background: var(--orange); color: #000; font-weight: bold; }

    .post-card { background: rgba(255,255,255,0.08); border-radius: 25px; padding: 25px; margin-bottom: 25px; border-left: 8px solid var(--orange); }
    .post-header-info { font-size: 22px; font-weight: bold; margin-bottom: 10px; color: #fff; }
    .post-category-label { color: var(--orange); font-size: 22px; font-weight: 900; margin-bottom: 12px; display: block; }
    
    .btn-post {
      width: 100%; padding: 22px; background: linear-gradient(135deg, var(--orange), #ffcc80);
      color: #000; font-weight: 900; border: none; border-radius: 18px; cursor: pointer;
      margin-top: 30px; font-size: 22px;
    }

    textarea, select, input[type="text"] {
      width: 100%; background: var(--input-bg); border: 1px solid #555; color: white;
      padding: 15px; border-radius: 12px; margin-top: 8px; font-size: 16px; outline: none;
    }
  </style>
</head>
<body>

<div class="galaxy-container"></div>
<div id="starField"></div>

<div class="container">
  <header>
    <h1 class="main-title">CULTURE SEED</h1>
    <div class="sub-title">第二東京コンタクトセンター</div>
    <div class="emoji-growth">🫘 🌱 🌼</div>
  </header>

  <div class="grid">
    <main>
      <section class="panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
          <h2 style="margin:0;">Seed Box</h2>
          <select id="archiveSelect" style="width:auto; height:40px; border-radius:20px; font-size:14px; padding:0 10px; border:1px solid var(--orange); background:#000; color:var(--orange);">
            <option value="2026-03">2026年3月</option>
            <option value="2026-02">2026年2月</option>
          </select>
        </div>
        <div class="sort-area">
          <button class="sort-btn active" onclick="changeSort('new', this)">✨ 新着順</button>
          <button class="sort-btn" onclick="changeSort('stamps', this)">🔥 スタンプ順</button>
          <button class="sort-btn" onclick="changeSort('comments', this)">💬 コメント順</button>
        </div>
        <div id="feedList">銀河を同期中...</div>
      </section>

      <section class="panel">
        <h2 style="margin-top:0;">Sow Seeds</h2>
        <form id="cultureForm">
          <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-bottom:15px;">
            <div><label>From</label><select id="fromName" required></select></div>
            <div><label>To</label><select id="toName"></select></div>
          </div>
          <label>Category</label>
          <select id="category">
            <option value="Thanks">🤝 Thanks</option>
            <option value="Business">💰 商売を展開、商売を心から楽しむ</option>
            <option value="MVV">🔥 MVVを体現</option>
            <option value="Owner">💎 主体性の発揮</option>
            <option value="Bonji">✨ 凡事徹底</option>
          </select>
          <textarea id="message" rows="5" required style="margin-top:20px;" placeholder="エピソードを入力してください..."></textarea>
          <button type="submit" class="btn-post">投稿を送信</button>
        </form>
      </section>
    </main>

    <aside>
      <section class="panel">
        <h3 style="margin-top:0; color:var(--orange);">トレンド</h3>
        <div id="trendStats" style="font-size:18px; line-height:2.2;"></div>
      </section>
      <section class="panel">
        <h3 style="margin-top:0; color:var(--orange);">今月のランキング</h3>
        <select id="rankArchiveSelect" style="width:100%; height:40px; border-radius:10px; margin-bottom:20px; background:#000; color:var(--orange); border:1px solid var(--orange);">
          <option value="2026-03">2026年3月のランキング</option>
          <option value="2026-02">2026年2月のランキング</option>
        </select>
        <div id="rankingList"></div>
      </section>
    </aside>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, push, onValue, update, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  // --- Firebase Config (差し替えてください) ---
  const firebaseConfig = {
    apiKey: "AIzaSyC_2bIvYpfgKrgyfQ9YKE1CykpnxLfQi0k",
    authDomain: "second-cc-culture-feed.firebaseapp.com",
    databaseURL: "https://second-cc-culture-feed-default-rtdb.firebaseio.com",
    projectId: "second-cc-culture-feed",
    storageBucket: "second-cc-culture-feed.firebasestorage.app",
    messagingSenderId: "1042140470022",
    appId: "1:1042140470022:web:8d2a9de18d6d55060f9c87"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const postsRef = ref(db, 'posts');

  // リストの先頭に「第二全体」を追加
  const members = ["第二全体", "未選択", "安齋 慶人", "金井 裕之介", "中村 景一郎", "前田 拓真", "庄司 祐亮", "太田 魁晟", "高本 優", "白鳥 拓人", "柳沢 緋里", "和田 翔太郎", "斉藤 直文", "中川 春花", "三登 有夏", "金兒 胤栄", "山﨑 紀史", "茨 陸翔", "古田 大貴", "吉増 海斗"];
  let rawData = {};
  let currentSort = 'new';

  const f = document.getElementById('fromName'), t = document.getElementById('toName');
  members.forEach(m => { f.add(new Option(m, m)); t.add(new Option(m, m)); });

  onValue(postsRef, (s) => { rawData = s.val() || {}; refreshUI(); });

  function refreshUI() {
    const boxMonth = document.getElementById('archiveSelect').value;
    const rankMonth = document.getElementById('rankArchiveSelect').value;
    
    let feedPosts = Object.entries(rawData).map(([id, p]) => ({ id, ...p })).filter(p => p.dateKey === boxMonth);
    if(currentSort === 'stamps') {
      feedPosts.sort((a,b) => (Object.values(b.reactions||{}).reduce((s,v)=>s+v,0)) - (Object.values(a.reactions||{}).reduce((s,v)=>s+v,0)));
    } else if(currentSort === 'comments') {
      feedPosts.sort((a,b) => Object.keys(b.replies||{}).length - Object.keys(a.replies||{}).length);
    } else { feedPosts.reverse(); }
    
    renderFeed(feedPosts, boxMonth);
    const rankPosts = Object.entries(rawData).map(([id, p]) => ({ id, ...p })).filter(p => p.dateKey === rankMonth);
    renderStats(rankPosts);
    renderRanking(rankPosts);
  }

  function renderFeed(posts, month) {
    const list = document.getElementById('feedList');
    list.innerHTML = posts.map(p => `
      <div class="post-card">
        <div class="post-header-info">${p.from} ➔ ${p.to}</div>
        <span class="post-category-label">${p.category}</span>
        <div style="margin:20px 0; font-size:18px; line-height:1.7; white-space:pre-wrap;">${p.message}</div>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          ${Object.entries(p.reactions || {"👏":0, "🔥":0, "💰":0}).map(([emoji, count]) => `
            <button style="background:rgba(255,255,255,0.1); border:none; color:white; padding:8px 16px; border-radius:99px; cursor:pointer;" onclick="window.addReaction('${p.id}', '${emoji}', ${count})">${emoji} ${count}</button>
          `).join('')}
          <button style="background:rgba(255,255,255,0.2); border:none; border-radius:50%; width:36px; height:36px; color:white; cursor:pointer;" onclick="window.promptEmoji('${p.id}')">+</button>
        </div>
      </div>
    `).join('') || `<div style="text-align:center; padding:20px; opacity:0.5;">${month} の種はまだありません。</div>`;
  }

  function renderStats(posts) {
    const cats = { Thanks:0, Business:0, MVV:0, Owner:0, Bonji:0 };
    posts.forEach(p => { 
      // 内部データが古い文言でも集計できるよう調整
      if(p.category.includes('Thanks')) cats.Thanks++;
      else if(p.category.includes('Business') || p.category.includes('商売')) cats.Business++;
      else if(p.category.includes('MVV')) cats.MVV++;
      else if(p.category.includes('Owner') || p.category.includes('主体性')) cats.Owner++;
      else if(p.category.includes('Bonji') || p.category.includes('凡事')) cats.Bonji++;
    });
    // 文言修正を反映
    document.getElementById('trendStats').innerHTML = `
      <div style="font-size:24px; color:var(--orange); font-weight:bold;">Total: ${posts.length}</div>
      🤝 Thanks: ${cats.Thanks}<br>
      💰 商売を展開、商売を心から楽しむ: ${cats.Business}<br>
      🔥 MVVを体現: ${cats.MVV}<br>
      💎 主体性の発揮: ${cats.Owner}<br>
      ✨ 凡事徹底: ${cats.Bonji}
    `;
  }

  function renderRanking(posts) {
    const scores = {};
    posts.forEach(p => { const target = p.to !== "未選択" ? p.to : p.from; scores[target] = (scores[target] || 0) + 1; });
    const sorted = Object.entries(scores).sort((a,b)=>b[1]-a[1]).slice(0, 8);
    document.getElementById('rankingList').innerHTML = sorted.map(([n,c],i)=>`
      <div style="font-size:20px; padding:15px 0; border-bottom:1px solid rgba(255,255,255,0.1); display:flex; justify-content:space-between;">
        <span>${i+1}. ${n}</span><strong>${c} pt</strong>
      </div>
    `).join('') || "No data";
  }

  window.changeSort = (type, btn) => { currentSort = type; document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); refreshUI(); };
  window.addReaction = (id, emoji, count) => update(ref(db, `posts/${id}/reactions`), { [emoji]: count + 1 });
  window.promptEmoji = (id) => { const e = prompt("好きな絵文字を入力してください:"); if(e) window.addReaction(id, e, 0); };

  document.getElementById('cultureForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const now = new Date();
    const autoDateKey = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
    push(postsRef, { from: f.value, to: t.value, category: document.getElementById('category').value, message: document.getElementById('message').value, timestamp: serverTimestamp(), dateKey: autoDateKey });
    e.target.reset();
  });

  document.getElementById('archiveSelect').addEventListener('change', refreshUI);
  document.getElementById('rankArchiveSelect').addEventListener('change', refreshUI);

  // --- 修正点：豪華な多色の星と流れ星の生成 ---
  const sf = document.getElementById('starField');
  const colors = ["#ffffff", "#fffde7", "#e1bee7", "#ffcc80", "#c8e6c9", "#bbdefb", "#ff5252"];
  for(let i=0; i<300; i++) {
    const s = document.createElement('div'); s.className = 'twinkle-star';
    s.style.width = s.style.height = (Math.random()*3+1)+'px';
    s.style.left = Math.random()*100+'vw'; s.style.top = Math.random()*150+'vh'; // 下部まで
    s.style.background = colors[Math.floor(Math.random()*colors.length)];
    s.style.setProperty('--d', (Math.random()*4+2)+'s'); sf.appendChild(s);
  }
  setInterval(() => {
    const s = document.createElement('div'); s.className = 'shooting-star';
    s.style.left = Math.random()*110+'vw'; s.style.animationDuration = (Math.random()*1.2+0.8)+'s';
    s.style.background = 'linear-gradient(to bottom, transparent, #fff)'; sf.appendChild(s);
    setTimeout(() => s.remove(), 2500);
  }, 300);
</script>
</body>
</html>
