<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CULTURE SEED - 第二東京CC</title>
  <style>
    :root {
      --orange: #ff8c1a;
      --glass: rgba(255, 255, 255, 0.1);
      --input-bg: rgba(0, 0, 0, 0.8);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0; background: #010208; color: #fff;
      font-family: "Inter", "Noto Sans JP", sans-serif;
      overflow-x: hidden; min-height: 100vh;
    }

    /* --- 背景：天の川と銀河 --- */
    .galaxy-container {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(ellipse at 50% 50%, rgba(70, 50, 150, 0.4), transparent),
                  url('https://www.transparenttextures.com/patterns/stardust.png');
    }
    .shooting-star {
      position: absolute; top: -150px; width: 2px;
      opacity: 0; animation: shoot linear infinite;
    }
    @keyframes shoot {
      0% { transform: translate(100vw, 0) rotate(35deg); opacity: 0; }
      10% { opacity: 1; }
      40% { transform: translate(-20vw, 120vh) rotate(35deg); opacity: 0; }
      100% { opacity: 0; }
    }

    .container { width: 94%; max-width: 1250px; margin: 0 auto; position: relative; z-index: 10; padding-bottom: 80px; }
    header { text-align: center; padding: 60px 0 30px; }
    .main-title { font-size: clamp(2.8rem, 9vw, 5.5rem); font-weight: 900; letter-spacing: 8px; text-shadow: 0 0 40px var(--orange); margin: 0; }
    .emoji-growth { font-size: 2.2rem; margin-top: 15px; letter-spacing: 20px; }

    .grid { display: grid; grid-template-columns: 1fr 420px; gap: 30px; }
    @media (max-width: 1100px) { .grid { grid-template-columns: 1fr; } }

    .panel {
      background: var(--glass); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 32px; padding: 30px; margin-bottom: 30px; backdrop-filter: blur(25px);
    }

    #feedList {
      max-height: 700px; overflow-y: auto; padding-right: 15px;
      scrollbar-width: thin; scrollbar-color: var(--orange) transparent;
    }
    #feedList::-webkit-scrollbar { width: 6px; }
    #feedList::-webkit-scrollbar-thumb { background: var(--orange); border-radius: 10px; }

    #archiveSelect {
      height: 45px; padding: 0 15px; background: var(--input-bg); border: 1px solid var(--orange);
      color: var(--orange); border-radius: 25px; font-weight: bold; font-size: 16px;
    }

    .values-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
      background: rgba(0,0,0,0.4); padding: 15px; border-radius: 15px;
    }
    .value-item { display: flex; align-items: center; font-size: 13px; cursor: pointer; }

    .btn-post {
      width: 100%; padding: 22px; background: linear-gradient(135deg, var(--orange), #ffcc80);
      color: #000; font-weight: 900; border: none; border-radius: 18px; cursor: pointer;
      margin-top: 30px; font-size: 22px; transition: 0.3s;
    }
    .btn-post:active { transform: scale(0.95); }

    textarea, select, input {
      width: 100%; background: var(--input-bg); border: 1px solid #444; color: white;
      padding: 15px; border-radius: 12px; margin-top: 10px; font-size: 16px; outline: none;
    }

    .post-card { background: rgba(255,255,255,0.08); border-radius: 25px; padding: 25px; margin-bottom: 25px; border-left: 8px solid var(--orange); }

    /* --- 演出：花と星のパーティクル --- */
    .particle {
      position: fixed; pointer-events: none; z-index: 9999;
      animation: particle-move 2s ease-out forwards;
    }
    @keyframes particle-move {
      0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) rotate(var(--tr)) scale(1.5); opacity: 0; }
    }

    /* 絵文字パレット */
    .emoji-picker {
      position: absolute; background: #222; border: 1px solid #444; border-radius: 10px;
      padding: 10px; display: none; grid-template-columns: repeat(5, 1fr); gap: 5px; z-index: 100;
    }
    .emoji-btn { font-size: 20px; cursor: pointer; border: none; background: none; }
    .emoji-btn:hover { background: rgba(255,255,255,0.1); }
  </style>
</head>
<body>

<div class="galaxy-container"></div>
<div id="starField"></div>

<div class="container">
  <header>
    <h1 class="main-title">CULTURE SEED</h1>
    <div style="opacity: 0.7; font-size: 14px; letter-spacing: 4px; margin-top: 10px;">第二東京コンタクトセンター</div>
    <div class="emoji-growth">🫘 🌱 🌼</div>
  </header>

  <div class="grid">
    <main>
      <section class="panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px; flex-wrap:wrap; gap:15px;">
          <h2 style="margin:0;">Seed Box</h2>
          <select id="archiveSelect">
            <option value="2026-03">2026年3月</option>
            <option value="2026-02">2026年2月</option>
          </select>
        </div>
        <div id="feedList">同期中...</div>
      </section>

      <section class="panel">
        <h2 style="margin-top:0;">Sow Seeds</h2>
        <form id="cultureForm">
          <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:15px;">
            <div><label style="font-size:12px;">From</label><select id="fromName" required></select></div>
            <div><label style="font-size:12px;">To</label><select id="toName"></select></div>
          </div>
          <div style="margin-bottom:15px;">
            <label style="font-size:12px;">Category</label>
            <select id="category">
              <option value="Thanks">🤝 Thanks</option>
              <option value="Business">💰 商売を楽しむ</option>
              <option value="MVV">🔥 MVV体現</option>
              <option value="Owner">💎 主体性</option>
              <option value="Bonji">✨ 凡事徹底</option>
            </select>
          </div>
          <div style="margin-bottom:15px;">
            <label style="font-size:12px;">10 Core Values</label>
            <div class="values-grid" id="valuesCheckboxes"></div>
          </div>
          <textarea id="message" rows="4" required placeholder="エピソードを詳しく教えてください..."></textarea>
          <input type="text" id="tags" placeholder="#ありがとう #変化と挑戦">
          <button type="submit" class="btn-post">投稿する</button>
        </form>
      </section>
    </main>

    <aside>
      <section class="panel">
        <h3 style="margin-top:0; color:var(--orange);">Trend Stats</h3>
        <div id="trendStats"></div>
      </section>
      <section class="panel">
        <h3 style="margin-top:0; margin-bottom:20px; color:var(--orange);">Ranking</h3>
        <div id="rankingList"></div>
      </section>
    </aside>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, push, onValue, update, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC_2bIvYpfgKrgyfQ9YKE1CykpnxLfQi0k",
    authDomain: "second-cc-culture-feed.firebaseapp.com",
    databaseURL: "https://second-cc-culture-feed-default-rtdb.firebaseio.com",
    projectId: "second-cc-culture-feed",
    storageBucket: "second-cc-culture-feed.firebasestorage.app",
    messagingSenderId: "1042140470022",
    appId: "1:1042140470022:web:8d2a9de18d6d55060f9c87"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const postsRef = ref(db, 'posts');

  const members = ["未選択", "安齋 慶人", "金井 裕之介", "中村 景一郎", "前田 拓真", "庄司 祐亮", "太田 魁晟", "高本 優", "白鳥 拓人", "柳沢 緋里", "和田 翔太郎", "斉藤 直文", "中川 春花", "三登 有夏", "金兒 胤栄", "山﨑 紀史", "茨 陸翔", "古田 大貴", "吉増 海斗"];
  const coreValues = ["Speed 速度", "Change & Challenge 変化と挑戦", "Input & Output 学びと行動", "Priority 優先順位", "Continuous Outcome 継続的成果", "Responsibility 責任感", "Key Communication 本質的議論", "Team Work 共創", "Creativity 発想", "Long-term thinking 長期思考"];
  const defaultEmoji = ["🤝", "💰", "🔥", "💎", "✨"];
  const moreEmoji = ["🌸", "🌼", "⭐", "🍀", "🎉", "💯", "🚀", "💡", "🙌", "👑", "🎯", "🌈", "🎈", "💖", "✅"];

  // 初期化
  const f = document.getElementById('fromName'), t = document.getElementById('toName'), vGrid = document.getElementById('valuesCheckboxes');
  members.forEach(m => { f.add(new Option(m, m)); t.add(new Option(m, m)); });
  coreValues.forEach(v => { vGrid.innerHTML += `<label class="value-item"><input type="checkbox" name="cv" value="${v}">${v}</label>`; });

  onValue(postsRef, (s) => { render(s.val() || {}); });

  function render(data) {
    const val = document.getElementById('archiveSelect').value;
    const posts = Object.entries(data).map(([id, p]) => ({ id, ...p })).filter(p => p.dateKey === val).reverse();
    
    // フィード表示
    document.getElementById('feedList').innerHTML = posts.map(p => `
      <div class="post-card">
        <div style="display:flex; justify-content:space-between; font-size:12px; opacity:0.7;">
          <strong>${p.from} ➔ ${p.to}</strong>
          <span>${p.category}</span>
        </div>
        <div style="margin:10px 0; color:var(--orange); font-size:11px;">${p.values ? p.values.map(v=>'#'+v).join(' ') : ''} ${p.tags || ''}</div>
        <div style="margin:15px 0; font-size:16px; line-height:1.7; white-space:pre-wrap;">${p.message}</div>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          ${defaultEmoji.map(e => `
            <button style="background:rgba(255,255,255,0.1); border:none; color:white; padding:6px 12px; border-radius:99px; cursor:pointer;" onclick="window.react('${p.id}','${e}',${(p.reactions||{})[e]||0})">${e} ${(p.reactions||{})[e]||0}</button>
          `).join('')}
          ${Object.entries(p.reactions||{}).filter(([e])=>!defaultEmoji.includes(e)).map(([e,c])=>`
            <button style="background:rgba(255,255,255,0.1); border:none; color:white; padding:6px 12px; border-radius:99px; cursor:pointer;" onclick="window.react('${p.id}','${e}',${c})">${e} ${c}</button>
          `).join('')}
          <div style="position:relative;">
            <button style="background:rgba(255,255,255,0.2); border:none; border-radius:50%; width:32px; height:32px; color:white; cursor:pointer;" onclick="window.toggleEmoji('${p.id}')">+</button>
            <div id="picker-${p.id}" class="emoji-picker">
              ${moreEmoji.map(e=>`<button class="emoji-btn" onclick="window.react('${p.id}','${e}',${(p.reactions||{})[e]||0})">${e}</button>`).join('')}
            </div>
          </div>
        </div>
      </div>
    `).join('');

    // トレンドとランキング
    const cats = { Thanks:0, Business:0, MVV:0, Owner:0, Bonji:0 };
    const scores = {};
    posts.forEach(p => {
      cats[p.category]++;
      const target = p.to !== "未選択" ? p.to : p.from;
      scores[target] = (scores[target] || 0) + 1;
    });
    document.getElementById('trendStats').innerHTML = `<div style="font-size:24px; color:var(--orange); margin-bottom:15px;">Total: ${posts.length}</div>
      🤝 Thanks: ${cats.Thanks}<br>💰 商売を楽しむ: ${cats.Business}<br>🔥 MVV体現: ${cats.MVV}<br>💎 主体性: ${cats.Owner}<br>✨ 凡事徹底: ${cats.Bonji}`;
    
    const sorted = Object.entries(scores).sort((a,b)=>b[1]-a[1]).slice(0,5);
    document.getElementById('rankingList').innerHTML = sorted.map(([n,c],i)=>`<div style="font-size:18px; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.1); display:flex; justify-content:space-between;"><span>${i+1}. ${n}</span><strong>${c} pt</strong></div>`).join('') || "No Data";
  }

  window.react = (id, e, c) => { update(ref(db, `posts/${id}/reactions`), { [e]: c + 1 }); document.querySelectorAll('.emoji-picker').forEach(p=>p.style.display='none'); };
  window.toggleEmoji = (id) => { const p = document.getElementById(`picker-${id}`); p.style.display = p.style.display === 'grid' ? 'none' : 'grid'; };

  document.getElementById('cultureForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const checks = Array.from(document.querySelectorAll('input[name="cv"]:checked')).map(c => c.value);
    const postData = {
      from: f.value, to: t.value, category: document.getElementById('category').value,
      values: checks, message: document.getElementById('message').value, tags: document.getElementById('tags').value,
      timestamp: serverTimestamp(), dateKey: "2026-03", reactions: {}
    };
    push(postsRef, postData).then(() => { e.target.reset(); flowerEffect(); });
  });

  function flowerEffect() {
    const items = ["🌸", "🌼", "✨", "⭐", "🌸", "⭐", "☆"];
    for(let i=0; i<40; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.innerText = items[Math.floor(Math.random()*items.length)];
      p.style.left = '50%'; p.style.top = '50%';
      p.style.setProperty('--tx', (Math.random()-0.5)*1000+'px');
      p.style.setProperty('--ty', (Math.random()-0.5)*1000+'px');
      p.style.setProperty('--tr', Math.random()*720+'deg');
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 2000);
    }
  }

  // 背景：星
  const sf = document.getElementById('starField');
  for(let i=0; i<150; i++) {
    const s = document.createElement('div'); s.className = 'twinkle-star';
    s.style.width = s.style.height = (Math.random()*3+1)+'px';
    s.style.left = Math.random()*100+'vw'; s.style.top = Math.random()*100+'vh';
    s.style.setProperty('--d', (Math.random()*3+2)+'s'); sf.appendChild(s);
  }
  setInterval(() => {
    const s = document.createElement('div'); s.className = 'shooting-star';
    s.style.left = Math.random()*100+'vw'; s.style.animationDuration = (Math.random()*1+1)+'s';
    s.style.background = 'linear-gradient(to bottom, transparent, #fff)'; sf.appendChild(s);
    setTimeout(() => s.remove(), 2000);
  }, 300);
</script>
</body>
</html>
