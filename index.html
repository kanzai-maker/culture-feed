<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CULTURE SEED - 第二東京CC</title>
  <style>
    :root {
      --orange: #ff8c1a;
      --glass: rgba(255, 255, 255, 0.08);
      --input-bg: rgba(0, 0, 0, 0.7);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0; background: #010208; color: #fff;
      font-family: "Inter", "Noto Sans JP", sans-serif;
      overflow-x: hidden; min-height: 100vh;
    }

    /* 背景演出：星空と大量の流れ星 */
    .galaxy-container {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(circle at 50% 50%, rgba(40, 30, 100, 0.6), transparent),
                  url('https://www.transparenttextures.com/patterns/stardust.png');
    }
    .shooting-star {
      position: absolute; top: -120px; width: 2px;
      opacity: 0; animation: shoot linear infinite;
    }
    @keyframes shoot {
      0% { transform: translate(100vw, 0) rotate(35deg); opacity: 0; }
      10% { opacity: 1; }
      30% { transform: translate(-10vw, 100vh) rotate(35deg); opacity: 0; }
      100% { opacity: 0; }
    }

    .container { width: 94%; max-width: 1200px; margin: 0 auto; position: relative; z-index: 10; padding-bottom: 50px; }
    header { text-align: center; padding: 40px 0; }
    .main-title { font-size: clamp(2.5rem, 8vw, 5rem); font-weight: 900; letter-spacing: 5px; text-shadow: 0 0 30px var(--orange); margin: 0; }
    
    .grid { display: grid; grid-template-columns: 1fr 380px; gap: 25px; }
    @media (max-width: 1000px) { .grid { grid-template-columns: 1fr; } }

    .panel {
      background: var(--glass); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 28px; padding: 25px; margin-bottom: 25px; backdrop-filter: blur(20px);
    }

    /* フィードボックスの固定とスクロール */
    #feedList {
      max-height: 600px; overflow-y: auto; padding-right: 10px;
      scrollbar-width: thin; scrollbar-color: var(--orange) transparent;
    }
    #feedList::-webkit-scrollbar { width: 6px; }
    #feedList::-webkit-scrollbar-thumb { background: var(--orange); border-radius: 10px; }

    /* 並び替えスイッチ */
    .sort-area { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
    .sort-btn {
      background: rgba(255,255,255,0.1); border: none; color: white;
      padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 12px;
    }
    .sort-btn.active { background: var(--orange); color: #000; font-weight: bold; }

    /* トレンドの改行スタイル */
    .trend-item { font-size: 18px; line-height: 1.8; margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }

    /* ランキングの強化 */
    .tab-btn {
      flex: 1; padding: 12px 5px; font-size: 16px; /* 文字を大きく */
      background: rgba(255,255,255,0.1); border: none; color: white;
      border-radius: 10px; cursor: pointer; margin: 2px;
    }
    .tab-btn.active { background: var(--orange); color: #000; font-weight: bold; }
    .rank-row { font-size: 18px; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }

    /* 入力系 */
    textarea, select, input {
      width: 100%; background: var(--input-bg); border: 1px solid #444; color: white;
      padding: 15px; border-radius: 12px; margin-top: 10px; font-size: 16px;
    }
    .btn-post {
      width: 100%; padding: 20px; background: linear-gradient(135deg, var(--orange), #ffcc80);
      color: #000; font-weight: 900; border: none; border-radius: 15px; cursor: pointer;
      margin-top: 20px; font-size: 20px; display: block; text-align: center; /* 横書き確定 */
    }

    .post-card { background: rgba(255,255,255,0.08); border-radius: 22px; padding: 25px; margin-bottom: 20px; border-left: 8px solid var(--orange); }
    .post-img { max-width: 100%; border-radius: 12px; margin: 10px 0; border: 1px solid rgba(255,255,255,0.1); }

    /* リアクションボタン拡張 */
    .reaction-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 15px; }
    .emoji-add-btn { background: rgba(255,255,255,0.2); border: none; border-radius: 50%; width: 32px; height: 32px; color: white; cursor: pointer; }
  </style>
</head>
<body>

<div class="galaxy-container" id="starField"></div>

<div class="container">
  <header>
    <h1 class="main-title">CULTURE SEED</h1>
    <div style="font-size: 1.5rem; letter-spacing: 15px; margin-top:10px;">🫘 🌱 🌼</div>
  </header>

  <div class="grid">
    <main>
      <section class="panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:10px;">
          <h2 style="margin:0;">Culture Seed Box</h2>
          <select id="archiveSelect" style="width:auto; margin:0; height:40px; padding:0 10px;">
            <option value="2026-03">2026年3月</option>
            <option value="2026-02">2026年2月</option>
          </select>
        </div>

        <div class="sort-area">
          <button class="sort-btn active" onclick="setSort('new')">✨ 新着順</button>
          <button class="sort-btn" onclick="setSort('stamp')">🔥 スタンプ多い順</button>
          <button class="sort-btn" onclick="setSort('comment')">💬 コメント多い順</button>
        </div>

        <div id="feedList">データを同期中...</div>
      </section>

      <section class="panel" id="postPanel">
        <h2 style="margin-top:0;">種をまく（投稿）</h2>
        <form id="cultureForm">
          <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
            <select id="fromName" required></select>
            <select id="toName"></select>
          </div>
          <select id="category">
            <option value="THANKS">🤝 THANKS</option>
            <option value="BUSINESS">💰 商売を楽しむ</option>
            <option value="MVV">🔥 MVV体現</option>
            <option value="OWNER">💎 主体性</option>
            <option value="BONJI">✨ 凡事徹底</option>
          </select>
          <textarea id="message" rows="4" required placeholder="エピソードを入力..."></textarea>
          <input type="text" id="imageUrl" placeholder="画像のURLがあれば貼り付け（任意）">
          <button type="submit" class="btn-post">投稿を送信</button>
        </form>
      </section>
    </main>

    <aside>
      <section class="panel">
        <h3 style="margin-top:0;">トレンド</h3>
        <div id="trendStats"></div>
      </section>

      <section class="panel">
        <h3 style="margin-top:0; margin-bottom:15px;">ランキング</h3>
        <div style="display:flex; flex-wrap:wrap; gap:5px; margin-bottom:20px;">
          <button class="tab-btn active" onclick="changeRank('THANKS', this)">🤝 THANKS</button>
          <button class="tab-btn" onclick="changeRank('BUSINESS', this)">💰 商売</button>
          <button class="tab-btn" onclick="changeRank('MVV', this)">🔥 MVV</button>
          <button class="tab-btn" onclick="changeRank('OWNER', this)">💎 主体性</button>
          <button class="tab-btn" onclick="changeRank('BONJI', this)">✨ 凡事</button>
        </div>
        <div id="rankingList"></div>
      </section>
    </aside>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, push, onValue, update, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  // --- Firebase Config (あなたのものを貼り付けてください) ---
  const firebaseConfig = {
    apiKey: "AIzaSyC_2bIvYpfgKrgyfQ9YKE1CykpnxLfQi0k",
    authDomain: "second-cc-culture-feed.firebaseapp.com",
    databaseURL: "https://second-cc-culture-feed-default-rtdb.firebaseio.com",
    projectId: "second-cc-culture-feed",
    storageBucket: "second-cc-culture-feed.firebasestorage.app",
    messagingSenderId: "1042140470022",
    appId: "1:1042140470022:web:8d2a9de18d6d55060f9c87"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const postsRef = ref(db, 'posts');

  const members = ["未選択", "安齋 慶人", "金井 裕之介", "中村 景一郎", "前田 拓真", "庄司 祐亮", "太田 魁晟", "高本 優", "白鳥 拓人", "柳沢 緋里", "和田 翔太郎", "斉藤 直文", "中川 春花", "三登 有夏", "金兒 胤栄", "山﨑 紀史", "茨 陸翔", "古田 大貴", "吉増 海斗"];
  const currentMonthKey = "2026-03";
  let sortMode = 'new';
  let currentRankCat = 'THANKS';
  let rawData = {};

  // 初期化
  const f = document.getElementById('fromName'), t = document.getElementById('toName');
  members.forEach(m => { f.add(new Option(m, m)); t.add(new Option(m, m)); });

  // 投稿
  document.getElementById('cultureForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const postData = {
      from: f.value, to: t.value,
      category: document.getElementById('category').value,
      message: document.getElementById('message').value,
      image: document.getElementById('imageUrl').value,
      timestamp: serverTimestamp(),
      dateKey: currentMonthKey,
      reactions: { "👏": 0, "🔥": 0, "💰": 0 }
    };
    push(postsRef, postData).then(() => e.target.reset());
  });

  // データ取得
  onValue(postsRef, (snapshot) => {
    rawData = snapshot.val() || {};
    refreshUI();
  });

  function refreshUI() {
    const val = document.getElementById('archiveSelect').value;
    let posts = Object.entries(rawData)
      .map(([id, p]) => ({ id, ...p }))
      .filter(p => p.dateKey === val);

    // 並び替え
    if (sortMode === 'stamp') {
      posts.sort((a, b) => {
        const countA = Object.values(a.reactions || {}).reduce((sum, c) => sum + c, 0);
        const countB = Object.values(b.reactions || {}).reduce((sum, c) => sum + c, 0);
        return countB - countA;
      });
    } else if (sortMode === 'comment') {
      posts.sort((a, b) => Object.keys(b.replies || {}).length - Object.keys(a.replies || {}).length);
    } else {
      posts.reverse();
    }

    renderFeed(posts);
    renderStats(posts);
    renderRanking(posts, currentRankCat);
  }

  function renderFeed(posts) {
    const list = document.getElementById('feedList');
    if(!posts.length) { list.innerHTML = "種がまだありません。"; return; }
    list.innerHTML = posts.map(p => `
      <div class="post-card">
        <div style="display:flex; justify-content:space-between; font-size:12px; opacity:0.7;">
          <strong>${p.from} ➔ ${p.to}</strong>
          <span>${p.category}</span>
        </div>
        ${p.image ? `<img src="${p.image}" class="post-img">` : ''}
        <div style="margin:15px 0; font-size:16px; line-height:1.6; white-space:pre-wrap;">${p.message}</div>
        <div class="reaction-bar">
          ${Object.entries(p.reactions || {}).map(([emoji, count]) => `
            <button style="background:rgba(255,255,255,0.1); border:none; color:white; padding:6px 15px; border-radius:99px; cursor:pointer;" onclick="window.addReaction('${p.id}', '${emoji}', ${count})">${emoji} ${count}</button>
          `).join('')}
          <button class="emoji-add-btn" onclick="window.promptEmoji('${p.id}')">+</button>
        </div>
        <div style="margin-top:15px;">
          ${p.replies ? Object.values(p.replies).map(r => `
            <div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:10px; margin-top:5px; font-size:13px;">
              ${r.image ? `<img src="${r.image}" style="max-width:100px; display:block; margin-bottom:5px;">` : ''}
              ${r.text}
            </div>
          `).join('') : ''}
          <div style="display:flex; gap:5px; margin-top:10px;">
            <input type="text" id="re-txt-${p.id}" placeholder="返信..." style="padding:8px; font-size:13px; height:38px; margin:0;">
            <button onclick="window.addReply('${p.id}')" style="background:var(--orange); border:none; border-radius:8px; padding:0 15px; cursor:pointer; color:black; font-weight:bold;">送信</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  function renderStats(posts) {
    const cats = { THANKS:0, BUSINESS:0, MVV:0, OWNER:0, BONJI:0 };
    posts.forEach(p => cats[p.category]++);
    document.getElementById('trendStats').innerHTML = `
      <div class="trend-item" style="color:var(--orange); font-weight:bold; font-size:24px;">総数: ${posts.length}</div>
      <div class="trend-item">🤝 THANKS: ${cats.THANKS}</div>
      <div class="trend-item">💰 商売を楽しむ: ${cats.BUSINESS}</div>
      <div class="trend-item">🔥 MVV体現: ${cats.MVV}</div>
      <div class="trend-item">💎 主体性: ${cats.OWNER}</div>
      <div class="trend-item">✨ 凡事徹底: ${cats.BONJI}</div>
    `;
  }

  function renderRanking(posts, cat) {
    const scores = {};
    posts.forEach(p => {
      if (p.category !== cat) return;
      const target = p.to !== "未選択" ? p.to : p.from;
      scores[target] = (scores[target] || 0) + 1;
    });
    const sorted = Object.entries(scores).sort((a,b) => b[1]-a[1]).slice(0, 5);
    document.getElementById('rankingList').innerHTML = sorted.length ? sorted.map(([name, count], i) => `
      <div class="rank-row">
        <span>${i+1}. ${name}</span> <strong style="float:right; color:var(--orange);">${count} pts</strong>
      </div>
    `).join('') : "データなし";
  }

  // グローバル関数
  window.setSort = (mode) => {
    sortMode = mode;
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.toggle('active', b.innerText.includes(mode === 'new' ? '新着' : mode === 'stamp' ? 'スタンプ' : 'コメント')));
    refreshUI();
  };

  window.changeRank = (cat, btn) => {
    currentRankCat = cat;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    refreshUI();
  };

  window.addReaction = (id, emoji, count) => {
    update(ref(db, `posts/${id}/reactions`), { [emoji]: (count || 0) + 1 });
  };

  window.promptEmoji = (id) => {
    const emoji = prompt("好きな絵文字を入力してください (例: 👍, ✨, 🚀)");
    if(emoji) window.addReaction(id, emoji, 0);
  };

  window.addReply = (id) => {
    const text = document.getElementById(`re-txt-${id}`).value;
    const img = prompt("返信に画像を追加しますか？URLを入力してください（なければ空でOK）");
    if(!text && !img) return;
    push(ref(db, `posts/${id}/replies`), { text, image: img, timestamp: serverTimestamp() });
    document.getElementById(`re-txt-${id}`).value = "";
  };

  // 流れ星の生成（増量版）
  for(let i=0; i<15; i++) {
    const s = document.createElement('div');
    s.className = 'shooting-star';
    s.style.left = Math.random() * 100 + 'vw';
    s.style.animationDelay = Math.random() * 5 + 's';
    s.style.animationDuration = (Math.random() * 2 + 1) + 's';
    s.style.background = `linear-gradient(to bottom, transparent, #fff)`;
    document.getElementById('starField').appendChild(s);
  }
</script>
</body>
</html>
