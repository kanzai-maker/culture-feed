      --orange: #ff8c1a;
      --glass: rgba(255, 255, 255, 0.1);
      --input-bg: rgba(0, 0, 0, 0.8);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0; background: #010208; color: #fff;
      font-family: "Inter", "Noto Sans JP", sans-serif;
      overflow-x: hidden; min-height: 100vh;
    }

    /*背景演出：維持*/
    .galaxy-container {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: 
        radial-gradient(circle at 15% 20%, rgba(120, 40, 200, 0.4), transparent 60%),
        radial-gradient(circle at 85% 80%, rgba(20, 80, 180, 0.3), transparent 60%),
        radial-gradient(ellipse at 50% 40%, rgba(180, 60, 40, 0.2), transparent 70%),
        url('https://www.transparenttextures.com/patterns/stardust.png');
    }
    .twinkle-star { position: absolute; border-radius: 50%; opacity: 0; animation: twinkle var(--d) ease-in-out infinite; }
    @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.5); } }
    .shooting-star { position: absolute; top: -150px; width: 2px; opacity: 0; animation: shoot linear infinite; }
    @keyframes shoot {
      0% { transform: translate(100vw, 0) rotate(35deg); opacity: 0; }
      15% { opacity: 1; }
      45% { transform: translate(-20vw, 120vh) rotate(35deg); opacity: 0; }
      100% { opacity: 0; }
    }

    /* 修正：右下の浮遊する宇宙飛行士（ご指定の画像に変更し、ふわふわアニメーションを追加） */
    .floating-astronaut {
      position: fixed;
      right: 3%;
      bottom: 40px;
      width: clamp(100px, 15vw, 180px); /* 画像サイズを調整 */
      z-index: 5;
      pointer-events: none;
      animation: float-astro 6s ease-in-out infinite; /* ふわふわアニメーション */
      filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.2));
    }
    @keyframes float-astro {
      0%, 100% { transform: translateY(0) rotate(-5deg); }
      50% { transform: translateY(-25px) rotate(10deg); }
    }

    /* Thanks演出 */
    .thanks-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 6rem; font-weight: 900; color: #fffde7; text-shadow: 0 0 50px #ffd700; z-index: 10000; pointer-events: none; animation: thanksFade 2.5s forwards; }
    @keyframes thanksFade { 0% { opacity: 0; scale: 0.5; } 20% { opacity: 1; scale: 1.2; } 100% { opacity: 0; transform: translate(-50%, -70%); scale: 1; } }
    .particle { position: fixed; pointer-events: none; z-index: 9999; animation: particle-move 2s ease-out forwards; }
    @keyframes particle-move { 0% { opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) rotate(var(--tr)); opacity: 0; } }

    .container { width: 94%; max-width: 1250px; margin: 0 auto; position: relative; z-index: 10; padding-bottom: 80px; }
    header { text-align: center; padding: 30px 0 20px; }
    .main-title { font-size: clamp(2.8rem, 9vw, 5rem); font-weight: 900; letter-spacing: 8px; text-shadow: 0 0 40px var(--orange); margin: 0; }
    .emoji-growth { font-size: 2rem; margin-top: 10px; letter-spacing: 15px; }

    .grid { display: grid; grid-template-columns: 1fr 420px; gap: 30px; }
    @media (max-width: 1100px) { .grid { grid-template-columns: 1fr; } }

    .panel { background: var(--glass); border: 1px solid rgba(255,255,255,0.15); border-radius: 32px; padding: 30px; margin-bottom: 30px; backdrop-filter: blur(25px); }

    /* ソートボタン */
    .sort-area { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .sort-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px 18px; border-radius: 20px; cursor: pointer; font-size: 13px; }
    .sort-btn.active { background: var(--orange); color: #000; font-weight: bold; }

    /* Seed Box */
    #feedList { max-height: 800px; overflow-y: auto; padding-right: 15px; scrollbar-width: thin; scrollbar-color: var(--orange) transparent; }
    .post-card { background: rgba(255,255,255,0.08); border-radius: 25px; padding: 25px; margin-bottom: 25px; border-left: 8px solid var(--orange); }
    .post-header-info { font-size: 22px; font-weight: bold; margin-bottom: 10px; }
    .post-category-label { color: var(--orange); font-size: 22px; font-weight: 900; margin-bottom: 12px; display: block; }

    textarea, select, input[type="text"] { width: 100%; background: var(--input-bg); border: 1px solid #555; color: white; padding: 15px; border-radius: 12px; margin-top: 8px; font-size: 16px; outline: none; }
    .btn-post { width: 100%; padding: 22px; background: linear-gradient(135deg, var(--orange), #ffcc80); color: #000; font-weight: 900; border: none; border-radius: 18px; cursor: pointer; margin-top: 30px; font-size: 22px; }

    .values-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 15px; margin: 10px 0; }
    .value-item { display: flex; align-items: center; font-size: 13px; cursor: pointer; }
    .value-item input { width: 18px; height: 18px; margin-right: 8px; accent-color: var(--orange); }
  </style>
</head>

      {emoji: "🤝", label: "Thanks"},
      {emoji: "💰", label: "商売"},
      {emoji: "🔥", label: "MVV"},
      {emoji: "💎", label: "主体者"},
      {emoji: "✨", label: "凡事徹底"}
    ];

    document.getElementById('feedList').innerHTML = posts.map(p => `
      <div class="post-card">
        <div class="post-header-info">${p.from} ➔ ${p.to}</div>
        <span class="post-category-label">${p.category}</span>
        <div style="margin:10px 0; color:var(--orange); font-size:12px;">${p.values ? p.values.map(v=>'#'+v.split(' ')[0]).join(' ') : ''}</div>
        <div style="margin:15px 0; font-size:18px; line-height:1.7; white-space:pre-wrap;">${p.message}</div>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          ${fixedReactions.map(fr => {
            const count = (p.reactions && p.reactions[fr.emoji]) ? p.reactions[fr.emoji] : 0;
            return `<button onclick="window.addReaction('${p.id}','${fr.emoji}',${count})" style="background:rgba(255,255,255,0.1); border:none; color:white; padding:8px 16px; border-radius:99px; cursor:pointer; font-size:14px;">${fr.emoji}${fr.label} ${count}</button>`;
          }).join('')}
          <button onclick="window.promptEmoji('${p.id}')" style="background:rgba(255,255,255,0.1); border:none; color:white; padding:8px 16px; border-radius:99px; cursor:pointer;">＋</button>
        </div>
        <div style="margin-top:15px; border-top:1px solid rgba(255,255,255,0.1); padding-top:10px;">
          ${p.replies ? Object.values(p.replies).map(r => `<div style="background:rgba(255,255,255,0.05); padding:8px; border-radius:8px; margin-bottom:5px; font-size:14px;">${r.text}</div>`).join('') : ''}
          <div style="display:flex; gap:10px; margin-top:10px; align-items: center;">
            <input type="text" id="re-${p.id}" placeholder="返信..." style="flex:1; height:45px; font-size:14px; margin:0;">
            <button onclick="window.addReply('${p.id}')" style="background:var(--orange); border:none; border-radius:12px; height:45px; padding:0 25px; color:black; font-weight:bold; cursor:pointer; white-space:nowrap; min-width:80px;">送信</button>
          </div>
        </div>
      </div>
    `).join('') || "種がありません";
  }

  function renderStats(posts) {
    const cats = {"🤝 Thanks":0, "💰 商売を展開、商売を心から楽しむ":0, "🔥 MVVを体現":0, "💎 主体性の発揮":0, "✨ 凡事徹底":0};
    posts.forEach(p => { if(cats[p.category] !== undefined) cats[p.category]++; });
    document.getElementById('trendStats').innerHTML = `<div style="font-size:24px; color:var(--orange); font-weight:bold;">Total: ${posts.length}</div>` + 
      Object.entries(cats).map(([label, count]) => `<div>${label}: ${count}</div>`).join('');
  }

  function renderRanking(posts) {
    const scores = {};
    posts.forEach(p => { const target = p.to !== "未選択" ? p.to : p.from; scores[target] = (scores[target] || 0) + 1; });
    const sorted = Object.entries(scores).sort((a,b)=>b[1]-a[1]).slice(0, 8);
    document.getElementById('rankingList').innerHTML = sorted.map(([n,c],i)=>`<div style="font-size:20px; padding:15px 0; border-bottom:1px solid rgba(255,255,255,0.1); display:flex; justify-content:space-between;"><span>${i+1}. ${n}</span><strong>${c} pt</strong></div>`).join('') || "No Data";
  }

  window.setSort = (m) => { sortMode = m; document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active')); document.getElementById(`sort-${m}`).classList.add('active'); refreshUI(); };
  window.addReaction = (id, emoji, count) => update(ref(db, `posts/${id}/reactions`), { [emoji]: count + 1 });
  window.promptEmoji = (id) => { const e = prompt("絵文字を入力:"); if(e) window.addReaction(id, e, 0); };
  window.addReply = (id) => { const t = document.getElementById(`re-${id}`).value; if(t) { push(ref(db, `posts/${id}/replies`), { text: t, timestamp: serverTimestamp() }); document.getElementById(`re-${id}`).value = ""; } };

  document.getElementById('cultureForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const checks = Array.from(document.querySelectorAll('input[name="cv"]:checked')).map(c => c.value);
    const now = new Date();
    const dateKey = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
    push(postsRef, { from: f.value, to: t.value, category: document.getElementById('category').value, values: checks, message: document.getElementById('message').value, timestamp: serverTimestamp(), dateKey: dateKey })
    .then(() => { e.target.reset(); triggerThanksEffect(); });
  });

  function triggerThanksEffect() {
    const t = document.createElement('div'); t.className = 'thanks-popup'; t.innerText = 'Thanks! ✨';
    document.body.appendChild(t); setTimeout(() => t.remove(), 2500);
    const items = ["🌸", "🌼", "✨", "⭐", "☆"];
    for(let i=0; i<40; i++) {
      const p = document.createElement('div'); p.className = 'particle'; p.innerText = items[Math.floor(Math.random()*items.length)];
      p.style.left = '50%'; p.style.top = '50%';
      p.style.setProperty('--tx', (Math.random()-0.5)*1000+'px'); p.style.setProperty('--ty', (Math.random()-0.5)*1000+'px');
      p.style.setProperty('--tr', Math.random()*720+'deg');
      document.body.appendChild(p); setTimeout(() => p.remove(), 2000);
    }
  }

  document.getElementById('archiveSelect').addEventListener('change', refreshUI);
  document.getElementById('rankArchiveSelect').addEventListener('change', refreshUI);

  //演出維持
  const sf = document.getElementById('starField');
  const starColors = ["#ffffff", "#fffde7", "#ffcc80", "#ff5252", "#64ffda", "#448aff", "#f8bbd0"];
  for(let i=0; i<250; i++) {
    const s = document.createElement('div'); s.className = 'twinkle-star';
    s.style.width = s.style.height = (Math.random()*3+1)+'px';
    s.style.left = Math.random()*100+'vw'; s.style.top = Math.random()*150+'vh';
    s.style.background = starColors[Math.floor(Math.random()*starColors.length)];
    s.style.setProperty('--d', (Math.random()*4+2)+'s'); sf.appendChild(s);
  }
  setInterval(() => {
    const s = document.createElement('div'); s.className = 'shooting-star';
    s.style.left = Math.random()*110+'vw'; s.style.animationDuration = (Math.random()*1.2+0.8)+'s';
    s.style.background = 'linear-gradient(to bottom, transparent, #fff)'; sf.appendChild(s);
    setTimeout(() => s.remove(), 2500);
  }, 300);
</script>
</body>
</html>
