<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CULTURE SEED - 第二東京CC</title>

  <style>
    body {
      margin: 0;
      /* 全体でスクロールを許可しつつ背景を固定 */
      min-height: 100vh;
      background: #02030f;
      color: white;
      font-family: "Inter", "Noto Sans JP", sans-serif;
      overflow-x: hidden;
    }

    /* --- 変更：豪華な星雲・星間雲演出（下部まで継続） --- */
    .nebula {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: 
        radial-gradient(circle at 20% 30%, rgba(120, 80, 255, 0.25), transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(255, 120, 180, 0.25), transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(80, 180, 255, 0.2), transparent 60%),
        radial-gradient(circle at 30% 80%, rgba(60, 255, 160, 0.15), transparent 50%); /* 星間雲の追加 */
      pointer-events: none;
    }

    /* 星の瞬き */
    .twinkle-star {
      position: absolute; border-radius: 50%; opacity: 0; 
      animation: twinkle var(--d) ease-in-out infinite;
      z-index: 1;
    }
    @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.4); } }

    /* 流れ星 */
    .shooting-star {
      position: fixed; top: -150px; width: 2px;
      opacity: 0; animation: shoot linear infinite;
      z-index: 2;
    }
    @keyframes shoot {
      0% { transform: translate(100vw, 0) rotate(35deg); opacity: 0; }
      10% { opacity: 1; }
      40% { transform: translate(-20vw, 120vh) rotate(35deg); opacity: 0; }
      100% { opacity: 0; }
    }

    .container {
      position: relative;
      z-index: 10;
      width: 94%;
      max-width: 1250px;
      margin: 0 auto;
      padding-bottom: 80px;
    }

    header { text-align: center; padding: 60px 0 30px; }
    .main-title { font-size: clamp(2.8rem, 9vw, 5rem); font-weight: 900; letter-spacing: 8px; text-shadow: 0 0 40px #ff8c1a; margin: 0; }
    .sub-title { opacity: 0.9; font-size: 18px; letter-spacing: 5px; margin-top: 15px; font-weight: bold; color: #fffde7; }

    .grid { display: grid; grid-template-columns: 1fr 420px; gap: 30px; }
    @media (max-width: 1100px) { .grid { grid-template-columns: 1fr; } }

    .panel {
      background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 32px; padding: 30px; margin-bottom: 30px; backdrop-filter: blur(25px);
    }

    /* トレンド項目の修正 */
    .trend-item { font-size: 18px; line-height: 2.2; margin-bottom: 10px; }

    .btn-post {
      width: 100%; padding: 22px; background: linear-gradient(135deg, #ff8c1a, #ffcc80);
      color: #000; font-weight: 900; border: none; border-radius: 18px; cursor: pointer;
      margin-top: 30px; font-size: 22px;
    }

    textarea, select, input[type="text"] {
      width: 100%; background: rgba(0,0,0,0.8); border: 1px solid #555; color: white;
      padding: 15px; border-radius: 12px; margin-top: 8px; font-size: 16px; outline: none;
    }
  </style>
</head>
<body>

<div class="nebula"></div>
<div id="starField"></div>

<div class="container">
  <header>
    <h1 class="main-title">CULTURE SEED</h1>
    <div class="sub-title">第二東京コンタクトセンター</div>
    <div style="font-size: 2rem; margin-top: 15px; letter-spacing: 15px;">🫘 🌱 🌼</div>
  </header>

  <div class="grid">
    <main>
      <section class="panel">
        <h2 style="margin-top:0;">Sow Seeds</h2>
        <form id="cultureForm">
          <label>Category</label>
          <select id="category">
            <option value="Thanks">🤝 Thanks</option>
            <option value="Business">💰 商売を展開、商売を心から楽しむ</option>
            <option value="MVV">🔥 MVVを体現</option>
            <option value="Owner">💎 主体性の発揮</option>
            <option value="Bonji">✨ 凡事徹底</option>
          </select>
          <textarea id="message" rows="5" required style="margin-top:20px;" placeholder="エピソードを入力してください..."></textarea>
          <button type="submit" class="btn-post">投稿を送信</button>
        </form>
      </section>
    </main>

    <aside>
      <section class="panel">
        <h3 style="margin-top:0; color:#ff8c1a;">トレンド</h3>
        <div id="trendStats">
          <div class="trend-item">🤝 Thanks: 0</div>
          <div class="trend-item">💰 商売を展開、商売を心から楽しむ: 0</div>
          <div class="trend-item">🔥 MVVを体現: 0</div>
          <div class="trend-item">💎 主体性の発揮: 0</div>
          <div class="trend-item">✨ 凡事徹底: 0</div>
        </div>
      </section>
    </aside>
  </div>
</div>

<script>
  // --- 多色の星と流れ星の生成 ---
  const sf = document.getElementById('starField');
  const colors = ["#ffffff", "#fffde7", "#ff8c1a", "#ff5252", "#64ffda", "#448aff"]; // 白、黄、橙、赤、緑、青

  function createStars() {
    for(let i=0; i<300; i++) {
      const s = document.createElement('div');
      s.className = 'twinkle-star';
      const size = Math.random() * 3 + 1;
      s.style.width = size + 'px';
      s.style.height = size + 'px';
      s.style.left = Math.random() * 100 + 'vw';
      s.style.top = Math.random() * 200 + 'vh'; // サイト下部まで配置
      s.style.background = colors[Math.floor(Math.random() * colors.length)];
      s.style.setProperty('--d', (Math.random() * 4 + 2) + 's');
      sf.appendChild(s);
    }
  }

  function createShootingStars() {
    setInterval(() => {
      const s = document.createElement('div');
      s.className = 'shooting-star';
      s.style.left = Math.random() * 110 + 'vw';
      s.style.animationDuration = (Math.random() * 1.5 + 1) + 's';
      s.style.background = 'linear-gradient(to bottom, transparent, #fff)';
      sf.appendChild(s);
      setTimeout(() => s.remove(), 3000);
    }, 400); // 流れ星の頻度
  }

  createStars();
  createShootingStars();
</script>

</body>
</html>
