<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CULTURE SEED - 第二東京CC</title>
  <style>
    :root {
      --orange: #ff8c1a;
      --glass: rgba(255, 255, 255, 0.1);
      --input-bg: rgba(0, 0, 0, 0.8);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0; background: #010208; color: #fff;
      font-family: "Inter", "Noto Sans JP", sans-serif;
      overflow-x: hidden; min-height: 100vh;
    }

    /* 背景演出：維持 */
    .galaxy-container {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(circle at 15% 20%, rgba(120, 40, 200, 0.4), transparent 60%),
                  radial-gradient(circle at 85% 80%, rgba(20, 80, 180, 0.3), transparent 60%),
                  url('https://www.transparenttextures.com/patterns/stardust.png');
    }
    .twinkle-star { position: absolute; border-radius: 50%; opacity: 0; animation: twinkle var(--d) ease-in-out infinite; }
    @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.5); } }
    .shooting-star { position: absolute; top: -150px; width: 2px; opacity: 0; animation: shoot linear infinite; }
    @keyframes shoot {
      0% { transform: translate(100vw, 0) rotate(35deg); opacity: 0; }
      15% { opacity: 1; }
      45% { transform: translate(-20vw, 120vh) rotate(35deg); opacity: 0; }
      100% { opacity: 0; }
    }

    .container { width: 94%; max-width: 1250px; margin: 0 auto; position: relative; z-index: 10; padding-bottom: 80px; }
    header { text-align: center; padding: 30px 0 20px; }
    .main-title { font-size: clamp(2.8rem, 9vw, 5rem); font-weight: 900; letter-spacing: 8px; text-shadow: 0 0 40px var(--orange); margin: 0; }
    .sub-title { opacity: 0.9; font-size: 22px; letter-spacing: 5px; margin-top: 15px; font-weight: bold; color: #fffde7; }

    .grid { display: grid; grid-template-columns: 1fr 420px; gap: 30px; }
    @media (max-width: 1100px) { .grid { grid-template-columns: 1fr; } }

    .panel { background: var(--glass); border: 1px solid rgba(255,255,255,0.15); border-radius: 32px; padding: 30px; margin-bottom: 30px; backdrop-filter: blur(25px); }

    /* Seed Box（維持） */
    #feedList { max-height: 800px; overflow-y: auto; padding-right: 15px; scrollbar-width: thin; scrollbar-color: var(--orange) transparent; }
    .post-card { background: rgba(255,255,255,0.08); border-radius: 25px; padding: 25px; margin-bottom: 25px; border-left: 8px solid var(--orange); }
    .post-header-info { font-size: 22px; font-weight: bold; margin-bottom: 10px; }
    .post-category-label { color: var(--orange); font-size: 18px; font-weight: bold; margin-bottom: 10px; display: block; }

    /* --- 修正：10 Core Values 整列 --- */
    .values-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 15px; margin: 10px 0; }
    .value-item { display: flex; align-items: center; font-size: 13px; cursor: pointer; }
    .value-item input { width: 18px; height: 18px; margin-right: 8px; accent-color: var(--orange); }

    /* トレンド（修正） */
    .trend-clickable { cursor: pointer; padding: 5px; border-radius: 8px; transition: 0.2s; }
    .trend-clickable:hover { background: rgba(255,255,255,0.1); }

    textarea, select, input[type="text"] { width: 100%; background: var(--input-bg); border: 1px solid #555; color: white; padding: 15px; border-radius: 12px; margin-top: 8px; font-size: 16px; outline: none; }
    .btn-post { width: 100%; padding: 22px; background: linear-gradient(135deg, var(--orange), #ffcc80); color: #000; font-weight: 900; border: none; border-radius: 18px; cursor: pointer; margin-top: 20px; font-size: 22px; }
  </style>
</head>
<body>

<div class="galaxy-container"></div>
<div id="starField"></div>

<div class="container">
  <header>
    <h1 class="main-title">CULTURE SEED</h1>
    <div class="sub-title">第二東京コンタクトセンター</div>
  </header>

  <div class="grid">
    <main>
      <section class="panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
          <h2 style="margin:0;">Seed Box</h2>
          <select id="archiveSelect" style="width:auto; border:1px solid var(--orange); background:#000; color:var(--orange); border-radius:20px; padding:0 10px;">
            <option value="2026-03">2026年3月</option>
            <option value="2026-02">2026年2月</option>
          </select>
        </div>
        <div id="feedList">同期中...</div>
      </section>

      <section class="panel">
        <h2 style="margin-top:0;">Sow Seeds</h2>
        <form id="cultureForm">
          <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:15px;">
            <div><label>From</label><select id="fromName" required></select></div>
            <div><label>To</label><select id="toName"></select></div>
          </div>
          <label>項目選択</label>
          <select id="category">
            <option value="🤝 Thanks">🤝 Thanks</option>
            <option value="💰 商売を展開、商売を心から楽しむ">💰 商売を展開、商売を心から楽しむ</option>
            <option value="🔥 MVVを体現">🔥 MVVを体現</option>
            <option value="💎 主体性の発揮">💎 主体性の発揮</option>
            <option value="✨ 凡事徹底">✨ 凡事徹底</option>
          </select>
          <div style="margin-top:20px;">
            <label>10 Core Values (複数選択可)</label>
            <div class="values-grid" id="valuesCheckboxes"></div>
          </div>
          <textarea id="message" rows="5" required placeholder="エピソードを入力してください..." style="margin-top:10px;"></textarea>
          <button type="submit" class="btn-post">投稿を送信</button>
        </form>
      </section>
    </main>

    <aside>
      <section class="panel">
        <h3 style="margin-top:0; color:var(--orange);">トレンド</h3>
        <div id="trendStats" style="font-size:16px; line-height:2.2;"></div>
      </section>
      <section class="panel">
        <h3 style="margin-top:0; color:var(--orange);">今月のランキング</h3>
        <div id="rankingList"></div>
      </section>
    </aside>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, push, onValue, update, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC_2bIvYpfgKrgyfQ9YKE1CykpnxLfQi0k",
    authDomain: "second-cc-culture-feed.firebaseapp.com",
    databaseURL: "https://second-cc-culture-feed-default-rtdb.firebaseio.com",
    projectId: "second-cc-culture-feed",
    storageBucket: "second-cc-culture-feed.firebasestorage.app",
    messagingSenderId: "1042140470022",
    appId: "1:1042140470022:web:8d2a9de18d6d55060f9c87"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const postsRef = ref(db, 'posts');

  const members = ["第二全体", "未選択", "安齋 慶人", "金井 裕之介", "中村 景一郎", "前田 拓真", "庄司 祐亮", "太田 魁晟", "高本 優", "白鳥 拓人", "柳沢 緋里", "和田 翔太郎", "斉藤 直文", "中川 春花", "三登 有夏", "金兒 胤栄", "山﨑 紀史", "茨 陸翔", "古田 大貴", "吉増 海斗"];
  const coreValues = ["Speed 速度", "Change & Challenge 変化と挑戦", "Input & Output 学びと行動", "Priority 優先順位", "Continuous Outcome 継続的成果", "Responsibility 責任感", "Key Communication 本質的議論", "Team Work 共創", "Creativity 発想", "Long-term thinking 長期思考"];
  const categories = ["🤝 Thanks", "💰 商売を展開、商売を心から楽しむ", "🔥 MVVを体現", "💎 主体性の発揮", "✨ 凡事徹底"];
  let rawData = {};

  const f = document.getElementById('fromName'), t = document.getElementById('toName'), vGrid = document.getElementById('valuesCheckboxes');
  members.forEach(m => { f.add(new Option(m, m)); t.add(new Option(m, m)); });
  coreValues.forEach(v => { vGrid.innerHTML += `<label class="value-item"><input type="checkbox" name="cv" value="${v}">${v}</label>`; });

  onValue(postsRef, (s) => { rawData = s.val() || {}; refreshUI(); });

  function refreshUI() {
    const boxMonth = document.getElementById('archiveSelect').value;
    const posts = Object.entries(rawData).map(([id, p]) => ({ id, ...p })).filter(p => p.dateKey === boxMonth).reverse();
    
    // Seed Box 修正箇所
    document.getElementById('feedList').innerHTML = posts.map(p => `
      <div class="post-card">
        <div class="post-header-info">${p.from} ➔ ${p.to}</div>
        <span class="post-category-label">${p.category}</span>
        <div style="margin:15px 0; font-size:16px; line-height:1.7; white-space:pre-wrap;">${p.message}</div>
        <div style="display:flex; gap:10px;">
          ${Object.entries(p.reactions || {"👏":0, "🔥":0, "💰":0}).map(([emoji, count]) => `
            <button style="background:rgba(255,255,255,0.1); border:none; color:white; padding:8px 16px; border-radius:99px; cursor:pointer;" onclick="window.react('${p.id}','${emoji}',${count})">${emoji} ${count}</button>
          `).join('')}
        </div>
      </div>
    `).join('') || "種がありません";

    // トレンド 修正箇所
    const catsCount = {}; categories.forEach(c => catsCount[c] = 0);
    const scores = {};
    posts.forEach(p => {
      if(catsCount[p.category] !== undefined) catsCount[p.category]++;
      const target = p.to !== "未選択" ? p.to : p.from;
      scores[target] = (scores[target] || 0) + 1;
    });
    
    document.getElementById('trendStats').innerHTML = `<div style="font-size:22px; color:var(--orange); font-weight:bold; margin-bottom:10px;">Total: ${posts.length}</div>` + 
      categories.map(c => `<div class="trend-clickable" onclick="alert('${c}の投稿数: ${catsCount[c]}')">${c}: ${catsCount[c]}</div>`).join('');

    const sorted = Object.entries(scores).sort((a,b)=>b[1]-a[1]).slice(0, 8);
    document.getElementById('rankingList').innerHTML = sorted.map(([n,c],i)=>`<div style="font-size:18px; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.1); display:flex; justify-content:space-between;"><span>${i+1}. ${n}</span><strong>${c} pt</strong></div>`).join('') || "No Data";
  }

  window.react = (id, e, c) => update(ref(db, `posts/${id}/reactions`), { [e]: c + 1 });

  document.getElementById('cultureForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const now = new Date();
    const autoDateKey = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
    const checks = Array.from(document.querySelectorAll('input[name="cv"]:checked')).map(c => c.value);
    
    // Core Values をハッシュタグとしてメッセージの末尾に追加
    let finalMessage = document.getElementById('message').value;
    if(checks.length > 0) {
      finalMessage += "\n\n" + checks.map(v => "#" + v.split(' ')[0]).join(' ');
    }

    push(postsRef, { 
      from: f.value, 
      to: t.value, 
      category: document.getElementById('category').value, 
      message: finalMessage, 
      timestamp: serverTimestamp(), 
      dateKey: autoDateKey 
    }).then(() => { e.target.reset(); });
  });

  document.getElementById('archiveSelect').addEventListener('change', refreshUI);

  // 背景：維持
  const sf = document.getElementById('starField');
  for(let i=0; i<200; i++) {
    const s = document.createElement('div'); s.className = 'twinkle-star';
    s.style.width = s.style.height = (Math.random()*2.5+0.5)+'px';
    s.style.left = Math.random()*100+'vw'; s.style.top = Math.random()*120+'vh';
    s.style.setProperty('--d', (Math.random()*4+2)+'s'); sf.appendChild(s);
  }
  setInterval(() => {
    const s = document.createElement('div'); s.className = 'shooting-star';
    s.style.left = Math.random()*110+'vw'; s.style.animationDuration = (Math.random()*1.2+0.8)+'s';
    s.style.background = 'linear-gradient(to bottom, transparent, #fff)'; sf.appendChild(s);
    setTimeout(() => s.remove(), 2500);
  }, 400);
</script>
</body>
</html>
