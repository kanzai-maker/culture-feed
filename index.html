<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>第二東京コンタクトセンター CULTURE SEED</title>
  <style>
    :root {
      --orange: #ff8c1a;
      --star-white: #ffffff;
      --star-yellow: #fffde7;
      --star-purple: #e1bee7;
      --glass: rgba(255, 255, 255, 0.08);
      --input-bg: rgba(0, 0, 0, 0.7);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0; background: #010208; color: #fff;
      font-family: "Inter", "Noto Sans JP", sans-serif;
      overflow-x: hidden; min-height: 100vh;
      -webkit-text-size-adjust: 100%;
    }

    /* 濃密な銀河背景 */
    .galaxy-container {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: 
        radial-gradient(circle at 50% 50%, rgba(40, 30, 100, 0.6), transparent),
        radial-gradient(circle at 80% 20%, rgba(80, 40, 120, 0.4), transparent),
        url('https://www.transparenttextures.com/patterns/stardust.png');
      background-size: cover;
    }

    .twinkle-star {
      position: absolute; border-radius: 50%; background: white;
      opacity: 0; animation: twinkle var(--d) ease-in-out infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    .shooting-star {
      position: absolute; top: -120px; width: 2px;
      opacity: 0; animation: shoot linear infinite;
    }
    @keyframes shoot {
      0% { transform: translate(100vw, 0) rotate(40deg); opacity: 0; }
      15% { opacity: 1; }
      35% { transform: translate(-20vw, 100vh) rotate(40deg); opacity: 0; }
      100% { opacity: 0; }
    }

    .dna-bg {
      position: absolute; top: 100px; left: 50%; transform: translateX(-50%);
      font-size: 60vw; opacity: 0.15; z-index: -1;
      filter: blur(2px) drop-shadow(0 0 80px rgba(255,140,26,0.4));
      animation: dnaRotate 20s linear infinite;
    }
    @keyframes dnaRotate {
      from { transform: translateX(-50%) rotateY(0deg); }
      to { transform: translateX(-50%) rotateY(360deg); }
    }

    .container { width: 92%; max-width: 1200px; margin: 0 auto; position: relative; z-index: 10; padding-bottom: 50px; }
    
    header { text-align: center; padding: 60px 0; }
    .main-title { 
      font-size: clamp(2.5rem, 10vw, 5.5rem); 
      font-weight: 900; margin: 0; letter-spacing: 5px; 
      text-shadow: 0 0 30px rgba(255,140,26,0.7); 
    }
    .emoji-growth { font-size: 1.5rem; margin-top: 15px; letter-spacing: 15px; }

    /* グリッドレイアウト（スマホでは1列） */
    .grid { display: grid; grid-template-columns: 1fr 380px; gap: 20px; }
    @media (max-width: 1000px) {
      .grid { grid-template-columns: 1fr; }
      header { padding: 40px 0; }
      .emoji-growth { letter-spacing: 10px; }
    }

    .panel {
      background: var(--glass); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px; padding: 20px; margin-bottom: 20px; backdrop-filter: blur(25px);
    }

    .values-grid {
      display: grid; grid-template-columns: 1fr; gap: 10px;
      background: rgba(0,0,0,0.5); padding: 15px; border-radius: 12px;
    }
    @media (min-width: 600px) {
      .values-grid { grid-template-columns: 1fr 1fr; }
    }
    .value-item { display: flex; align-items: center; font-size: 13px; cursor: pointer; }
    .value-item input { width: 18px; height: 18px; margin-right: 12px; flex-shrink: 0; }

    textarea, select, input {
      width: 100%; background: var(--input-bg); border: 1px solid #444; color: white;
      padding: 12px; border-radius: 10px; margin-top: 8px; outline: none; font-size: 16px; /* 16pxにするとiPhoneでズームされない */
    }

    .btn-post {
      width: 100%; padding: 18px; background: linear-gradient(135deg, var(--orange), #ffcc80);
      color: #000; font-weight: 900; border: none; border-radius: 14px; cursor: pointer; margin-top: 20px; font-size: 18px;
    }

    .post-card { background: rgba(255,255,255,0.07); border-radius: 20px; padding: 20px; margin-bottom: 20px; border-left: 6px solid var(--orange); }

    .rank-tabs { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 15px; }
    .tab-btn {
      flex: 1; min-width: 60px; padding: 8px 2px; font-size: 9px; background: rgba(255,255,255,0.1); border: none;
      color: white; border-radius: 6px; cursor: pointer;
    }
    .tab-btn.active { background: var(--orange); color: #000; font-weight: bold; }

    .thanks-pop {
      position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%);
      font-size: 15vw; font-weight: 900; color: #fffde7; text-shadow: 0 0 40px var(--orange);
      pointer-events: none; z-index: 1000; animation: popOut 2s forwards;
    }
    @keyframes popOut { 0% { opacity:0; scale:0.5; } 20% { opacity:1; scale:1.2; } 100% { opacity:0; transform: translate(-50%, -200%); } }

    /* 返信エリアの調整 */
    .reply-area { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
    @media (min-width: 600px) {
      .reply-area { flex-direction: row; }
    }
  </style>
</head>
<body>

<div class="galaxy-container"></div>
<div id="starField"></div>

<div class="container">
  <header>
    <div class="dna-bg">🧬</div>
    <h1 class="main-title">CULTURE SEED</h1>
    <div class="emoji-growth">🫘 🌱 🌼</div>
    <div style="margin-top:15px; opacity:0.7; font-size: 12px; letter-spacing: 2px;">第二東京コンタクトセンター</div>
  </header>

  <div class="grid">
    <main>
      <div style="margin-bottom: 25px; display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.07); padding: 8px 20px; border-radius: 50px; width: fit-content; border: 1px solid rgba(255,255,255,0.1);">
        <label style="font-size: 12px;">表示期間:</label>
        <select id="archiveSelect" style="width: auto; margin:0; background:transparent; border:none; color:var(--orange); font-weight:bold; font-size: 14px;">
          <option value="2026-03">2026年3月</option>
          <option value="2026-02">2026年2月</option>
          <option value="2026-01">2026年1月</option>
        </select>
      </div>

      <section class="panel">
        <h2 style="margin-top:0; font-size: 20px;">Culture Seed</h2>
        <div id="feedList" style="font-size: 14px;">銀河を同期中...</div>
      </section>

      <section class="panel" id="postPanel">
        <h2 style="margin-top:0; font-size: 20px;">投稿する</h2>
        <form id="cultureForm">
          <div style="display:grid; grid-template-columns: 1fr; gap:15px; margin-bottom:15px;">
            <div><label style="font-size: 13px;">投稿者</label><select id="fromName" required></select></div>
            <div><label style="font-size: 13px;">対象者（任意）</label><select id="toName"></select></div>
          </div>
          <div class="field" style="margin-bottom:15px;">
            <label style="font-size: 13px;">カテゴリ</label>
            <select id="category">
              <option value="THANKS">🤝 THANKS</option>
              <option value="BUSINESS">💰 商売を楽しむ</option>
              <option value="MVV">🔥 MVV体現</option>
              <option value="OWNER">💎 主体性</option>
              <option value="BONJI">✨ 凡事徹底</option>
            </select>
          </div>
          <div class="field">
            <label style="margin-bottom:10px; display:block; font-size: 13px;">10 Core Values</label>
            <div class="values-grid" id="valuesCheckboxes"></div>
          </div>
          <div class="field" style="margin-top:20px;">
            <label style="font-size: 13px;">投稿内容</label>
            <textarea id="message" rows="4" required placeholder="エピソードを入力"></textarea>
          </div>
          <div class="field">
            <label style="font-size: 13px;">ハッシュタグ</label>
            <input type="text" id="tags" placeholder="#ありがとう">
          </div>
          <button type="submit" class="btn-post">投稿を送信</button>
        </form>
      </section>
      <div id="readonlyArea" style="display:none; text-align:center; padding:20px; border:2px dashed var(--orange); border-radius:20px; color:var(--orange);">
        過去期間は表示のみです
      </div>
    </main>

    <aside>
      <section class="panel">
        <h3 style="margin-top:0; font-size: 18px;">トレンド</h3>
        <div id="trendStats" style="font-size: 14px; line-height: 2.2;"></div>
      </section>

      <section class="panel">
        <h3 style="margin-top:0; font-size: 18px;">ランキング</h3>
        <div class="rank-tabs">
          <button class="tab-btn active" onclick="changeRank('THANKS', this)">🤝 THANKS</button>
          <button class="tab-btn" onclick="changeRank('BUSINESS', this)">💰 商売</button>
          <button class="tab-btn" onclick="changeRank('MVV', this)">🔥 MVV</button>
          <button class="tab-btn" onclick="changeRank('OWNER', this)">💎 主体性</button>
          <button class="tab-btn" onclick="changeRank('BONJI', this)">✨ 凡事</button>
        </div>
        <div id="rankingList" style="font-size: 14px;"></div>
      </section>
    </aside>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, push, onValue, update, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC_2bIvYpfgKrgyfQ9YKE1CykpnxLfQi0k",
    authDomain: "second-cc-culture-feed.firebaseapp.com",
    databaseURL: "https://second-cc-culture-feed-default-rtdb.firebaseio.com",
    projectId: "second-cc-culture-feed",
    storageBucket: "second-cc-culture-feed.firebasestorage.app",
    messagingSenderId: "1042140470022",
    appId: "1:1042140470022:web:8d2a9de18d6d55060f9c87"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const postsRef = ref(db, 'posts');

  const members = ["未選択", "安齋 慶人", "金井 裕之介", "中村 景一郎", "前田 拓真", "庄司 祐亮", "太田 魁晟", "高本 優", "白鳥 拓人", "柳沢 緋里", "和田 翔太郎", "斉藤 直文", "中川 春花", "三登 有夏", "金兒 胤栄", "山﨑 紀史", "茨 陸翔", "古田 大貴", "吉増 海斗"];
  const coreValues = ["Speed 速度", "Change & Challenge 変化と挑戦", "Input & Output 学びと行動", "Priority 優先順位", "Continuous Outcome 継続的成果", "Responsibility 責任感", "Key Communication 本質的議論", "Team Work 共創", "Creativity 発想", "Long-term thinking 長期思考"];
  const currentMonthKey = "2026-03";

  const f = document.getElementById('fromName'), t = document.getElementById('toName'), vGrid = document.getElementById('valuesCheckboxes');
  members.forEach(m => { f.add(new Option(m, m)); t.add(new Option(m, m)); });
  coreValues.forEach(v => { vGrid.innerHTML += `<label class="value-item"><input type="checkbox" name="cv" value="${v}">${v}</label>`; });

  document.getElementById('cultureForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const checks = Array.from(document.querySelectorAll('input[name="cv"]:checked')).map(c => c.value);
    const postData = {
      from: f.value, to: t.value,
      category: document.getElementById('category').value,
      values: checks,
      message: document.getElementById('message').value,
      tags: document.getElementById('tags').value.split(' ').filter(v => v),
      timestamp: serverTimestamp(),
      dateKey: currentMonthKey,
      reactions: { "👏": 0, "🔥": 0, "💰": 0 }
    };
    push(postsRef, postData).then(() => {
      showThanksEffect();
      e.target.reset();
    });
  });

  function showThanksEffect() {
    const div = document.createElement('div');
    div.className = 'thanks-pop';
    div.innerText = 'Seed! ✨';
    document.body.appendChild(div);
    setTimeout(() => div.remove(), 2000);
  }

  let currentRankCat = 'THANKS';
  onValue(postsRef, (snapshot) => {
    const data = snapshot.val();
    if (!data) return;
    updateView(data);
  });

  function updateView(data) {
    const posts = Object.entries(data).reverse();
    const val = document.getElementById('archiveSelect').value;
    const filtered = posts.filter(([_, p]) => p.dateKey === val);
    
    document.getElementById('postPanel').style.display = (val === currentMonthKey) ? 'block' : 'none';
    document.getElementById('readonlyArea').style.display = (val === currentMonthKey) ? 'none' : 'block';

    renderFeed(filtered);
    renderStats(filtered);
    renderRanking(filtered, currentRankCat);
  }

  function renderFeed(posts) {
    const list = document.getElementById('feedList');
    if(posts.length === 0) { list.innerHTML = "種がまだありません。"; return; }
    list.innerHTML = posts.map(([id, p]) => `
      <div class="post-card">
        <div style="display:flex; justify-content:space-between; font-size:11px; opacity:0.8;">
          <strong>${p.from} ➔ ${p.to}</strong>
          <span>${p.category}</span>
        </div>
        <div style="margin:8px 0; display:flex; flex-wrap:wrap; gap:5px;">
          ${p.values ? p.values.map(v => `<span style="color:var(--orange); font-size:10px;">#${v}</span>`).join('') : ''}
        </div>
        <div style="margin-bottom:15px; font-size:15px; line-height:1.6; white-space:pre-wrap;">${p.message}</div>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          ${Object.entries(p.reactions || {}).map(([emoji, count]) => `
            <button style="background:rgba(255,255,255,0.1); border:none; color:white; padding:6px 12px; border-radius:99px; font-size:12px;" onclick="window.addReaction('${id}', '${emoji}', ${count})">${emoji} ${count}</button>
          `).join('')}
        </div>
        <div class="reply-area">
          <input type="text" id="reply-text-${id}" placeholder="返信..." style="padding:8px; font-size:14px; height:38px; margin:0;">
          <button onclick="window.addReply('${id}')" style="background:var(--orange); border:none; border-radius:8px; padding:0 15px; cursor:pointer; color:black; font-weight:900; height:38px;">送信</button>
        </div>
        <div id="replies-${id}" style="margin-top:10px;">
          ${p.replies ? Object.values(p.replies).map(r => `<div style="background:rgba(255,255,255,0.05); padding:8px; border-radius:8px; margin-top:5px; font-size:12px;">${r.text}</div>`).join('') : ''}
        </div>
      </div>
    `).join('');
  }

  function renderStats(posts) {
    const cats = { THANKS:0, BUSINESS:0, MVV:0, OWNER:0, BONJI:0 };
    posts.forEach(([_, p]) => cats[p.category]++);
    document.getElementById('trendStats').innerHTML = `
      総数: <strong style="font-size:20px; color:var(--orange);">${posts.length}</strong><br>
      🤝THANKS: ${cats.THANKS} 💰商売: ${cats.BUSINESS}<br>
      🔥MVV: ${cats.MVV} 💎主体性: ${cats.OWNER}<br>✨凡事徹底: ${cats.BONJI}
    `;
  }

  function renderRanking(posts, cat) {
    const scores = {};
    posts.forEach(([_, p]) => {
      if (p.category !== cat) return;
      const target = p.to !== "未選択" ? p.to : p.from;
      scores[target] = (scores[target] || 0) + 1;
    });
    const sorted = Object.entries(scores).sort((a,b) => b[1]-a[1]).slice(0, 5);
    document.getElementById('rankingList').innerHTML = sorted.length ? sorted.map(([name, count], i) => `
      <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.1);">
        <span>${i+1}. ${name}</span><strong>${count} pts</strong>
      </div>
    `).join('') : "<div style='opacity:0.5;'>データなし</div>";
  }

  window.changeRank = (cat, btn) => {
    currentRankCat = cat;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    onValue(postsRef, (s) => {
      const all = Object.entries(s.val() || {}).reverse();
      const filter = all.filter(([_, p]) => p.dateKey === document.getElementById('archiveSelect').value);
      renderRanking(filter, cat);
    }, {onlyOnce: true});
  };

  window.addReaction = (id, emoji, count) => {
    update(ref(db, `posts/${id}/reactions`), { [emoji]: count + 1 });
  };

  window.addReply = (postId) => {
    const text = document.getElementById(`reply-text-${postId}`).value;
    if(!text) return;
    push(ref(db, `posts/${postId}/replies`), { name: "メンバー", text, timestamp: serverTimestamp() });
    document.getElementById(`reply-text-${postId}`).value = "";
  };

  document.getElementById('archiveSelect').addEventListener('change', () => {
    onValue(postsRef, (s) => updateView(s.val() || {}), {onlyOnce: true});
  });

  const sf = document.getElementById('starField');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'twinkle-star';
    const size = Math.random() * 2 + 1;
    s.style.width = size + 'px'; s.style.height = size + 'px';
    s.style.left = Math.random() * 100 + 'vw'; s.style.top = Math.random() * 100 + 'vh';
    s.style.setProperty('--d', (Math.random() * 3 + 2) + 's');
    sf.appendChild(s);
  }

  setInterval(() => {
    const s = document.createElement('div');
    s.className = 'shooting-star';
    s.style.left = (Math.random() * 100) + 'vw';
    s.style.animationDuration = (Math.random() * 1.5 + 1) + 's';
    s.style.background = `linear-gradient(to bottom, transparent, #fff)`;
    sf.appendChild(s);
    setTimeout(() => s.remove(), 3000);
  }, 800);
</script>
</body>
</html>
