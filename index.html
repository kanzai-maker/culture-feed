<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CULTURE SEED - 第二東京CC</title>
  <style>
    :root {
      --orange: #ff8c1a;
      --glass: rgba(255, 255, 255, 0.1);
      --input-bg: rgba(0, 0, 0, 0.8);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0; background: #010208; color: #fff;
      font-family: "Inter", "Noto Sans JP", sans-serif;
      overflow-x: hidden; min-height: 100vh;
    }

    /* --- 維持：銀河・星雲背景 --- */
    .galaxy-container {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: 
        radial-gradient(circle at 15% 20%, rgba(120, 40, 200, 0.4), transparent 60%),
        radial-gradient(circle at 85% 80%, rgba(20, 80, 180, 0.3), transparent 60%),
        radial-gradient(ellipse at 50% 40%, rgba(180, 60, 40, 0.2), transparent 70%),
        url('https://www.transparenttextures.com/patterns/stardust.png');
    }
    .twinkle-star { position: absolute; border-radius: 50%; opacity: 0; animation: twinkle var(--d) ease-in-out infinite; }
    @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.5); } }
    .shooting-star { position: absolute; top: -150px; width: 2px; opacity: 0; animation: shoot linear infinite; }
    @keyframes shoot {
      0% { transform: translate(100vw, 0) rotate(35deg); opacity: 0; }
      15% { opacity: 1; }
      45% { transform: translate(-20vw, 120vh) rotate(35deg); opacity: 0; }
      100% { opacity: 0; }
    }

    .container { width: 94%; max-width: 1250px; margin: 0 auto; position: relative; z-index: 10; padding-bottom: 80px; }
    header { text-align: center; padding: 30px 0 20px; }
    .main-title { font-size: clamp(2.8rem, 9vw, 5rem); font-weight: 900; letter-spacing: 8px; text-shadow: 0 0 40px var(--orange); margin: 0; }
    .sub-title { opacity: 0.9; font-size: 22px; letter-spacing: 5px; margin-top: 15px; font-weight: bold; color: #fffde7; }
    .emoji-growth { font-size: 2rem; margin-top: 10px; letter-spacing: 15px; }

    .grid { display: grid; grid-template-columns: 1fr 420px; gap: 30px; }
    @media (max-width: 1100px) { .grid { grid-template-columns: 1fr; } }

    .panel { background: var(--glass); border: 1px solid rgba(255,255,255,0.15); border-radius: 32px; padding: 30px; margin-bottom: 30px; backdrop-filter: blur(25px); }

    /* Seed Box（維持） */
    #feedList { max-height: 800px; overflow-y: auto; padding-right: 15px; scrollbar-width: thin; scrollbar-color: var(--orange) transparent; }
    .post-card { background: rgba(255,255,255,0.08); border-radius: 25px; padding: 25px; margin-bottom: 25px; border-left: 8px solid var(--orange); }
    .post-header-info { font-size: 22px; font-weight: bold; margin-bottom: 10px; }
    .post-category-label { color: var(--orange); font-size: 22px; font-weight: 900; margin-bottom: 12px; display: block; }

    /* --- 修正：ランキングセレクトボックス --- */
    .rank-select { width: 100%; height: 50px; border-radius: 12px; margin-bottom: 20px; background: #111; color: var(--orange); border: 1px solid var(--orange); padding: 0 15px; font-size: 16px; font-weight: bold; }

    /* --- 修正：投稿時の演出 --- */
    .thanks-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 6rem; font-weight: 900; color: #fffde7; text-shadow: 0 0 50px #ffd700; z-index: 10000; pointer-events: none; animation: thanksFade 2.5s forwards; }
    @keyframes thanksFade { 0% { opacity: 0; scale: 0.5; } 20% { opacity: 1; scale: 1.2; } 100% { opacity: 0; transform: translate(-50%, -70%); scale: 1; } }
    .particle { position: fixed; pointer-events: none; z-index: 9999; animation: particle-move 2s ease-out forwards; }
    @keyframes particle-move { 0% { opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) rotate(var(--tr)); opacity: 0; } }

    /* --- 修正：リアクションボタン --- */
    .reaction-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px 14px; border-radius: 99px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 5px; }
    .reaction-btn:hover { background: rgba(255,255,255,0.2); }

    /* --- 修正：コメント/返信エリア --- */
    .reply-section { margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
    .reply-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; margin-bottom: 10px; }

    textarea, select, input[type="text"] { width: 100%; background: var(--input-bg); border: 1px solid #555; color: white; padding: 15px; border-radius: 12px; margin-top: 8px; font-size: 16px; outline: none; }
    .btn-post { width: 100%; padding: 22px; background: linear-gradient(135deg, var(--orange), #ffcc80); color: #000; font-weight: 900; border: none; border-radius: 18px; cursor: pointer; margin-top: 30px; font-size: 22px; }
  </style>
</head>
<body>

<div class="galaxy-container"></div>
<div id="starField"></div>

<div class="container">
  <header>
    <h1 class="main-title">CULTURE SEED</h1>
    <div class="sub-title">第二東京コンタクトセンター</div>
    <div class="emoji-growth">🫘 🌱 🌼</div>
  </header>

  <div class="grid">
    <main>
      <section class="panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
          <h2 style="margin:0;">Seed Box</h2>
          <select id="archiveSelect" style="width:auto; height:40px; border-radius:20px; border:1px solid var(--orange); background:#000; color:var(--orange); padding:0 10px;">
            <option value="2026-03">2026年3月</option>
            <option value="2026-02">2026年2月</option>
          </select>
        </div>
        <div id="feedList">同期中...</div>
      </section>

      <section class="panel">
        <h2 style="margin-top:0;">Sow Seeds</h2>
        <form id="cultureForm">
          <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
            <select id="fromName" required></select>
            <select id="toName"></select>
          </div>
          <select id="category" style="margin-top:15px;">
            <option value="Thanks">🤝 Thanks</option>
            <option value="Business">💰 商売を展開、商売を心から楽しむ</option>
            <option value="MVV">🔥 MVVを体現</option>
            <option value="Owner">💎 主体性の発揮</option>
            <option value="Bonji">✨ 凡事徹底</option>
          </select>
          <textarea id="message" rows="5" required style="margin-top:20px;" placeholder="エピソードを入力してください..."></textarea>
          <button type="submit" class="btn-post">投稿を送信</button>
        </form>
      </section>
    </main>

    <aside>
      <section class="panel">
        <h3 style="margin-top:0; color:var(--orange);">トレンド</h3>
        <div id="trendStats" style="font-size:18px; line-height:2.2;"></div>
      </section>
      <section class="panel">
        <h3 style="margin-top:0; color:var(--orange);">今月のランキング</h3>
        <select id="rankArchiveSelect" class="rank-select">
          <option value="2026-03">2026年3月のランキング</option>
          <option value="2026-02">2026年2月のランキング</option>
        </select>
        <div id="rankingList"></div>
      </section>
    </aside>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, push, onValue, update, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC_2bIvYpfgKrgyfQ9YKE1CykpnxLfQi0k",
    authDomain: "second-cc-culture-feed.firebaseapp.com",
    databaseURL: "https://second-cc-culture-feed-default-rtdb.firebaseio.com",
    projectId: "second-cc-culture-feed",
    storageBucket: "second-cc-culture-feed.firebasestorage.app",
    messagingSenderId: "1042140470022",
    appId: "1:1042140470022:web:8d2a9de18d6d55060f9c87"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const postsRef = ref(db, 'posts');

  const members = ["第二全体", "未選択", "安齋 慶人", "金井 裕之介", "中村 景一郎", "前田 拓真", "庄司 祐亮", "太田 魁晟", "高本 優", "白鳥 拓人", "柳沢 緋里", "和田 翔太郎", "斉藤 直文", "中川 春花", "三登 有夏", "金兒 胤栄", "山﨑 紀史", "茨 陸翔", "古田 大貴", "吉増 海斗"];
  const fixedReactions = [
    {emoji: "🤝", label: "Thanks"},
    {emoji: "💰", label: "商売"},
    {emoji: "🔥", label: "MVV"},
    {emoji: "💎", label: "主体性"},
    {emoji: "✨", label: "凡事徹底"}
  ];
  let rawData = {};

  const f = document.getElementById('fromName'), t = document.getElementById('toName');
  members.forEach(m => { f.add(new Option(m, m)); t.add(new Option(m, m)); });

  onValue(postsRef, (s) => { rawData = s.val() || {}; refreshUI(); });

  function refreshUI() {
    const boxMonth = document.getElementById('archiveSelect').value;
    const rankMonth = document.getElementById('rankArchiveSelect').value;
    const posts = Object.entries(rawData).map(([id, p]) => ({ id, ...p })).filter(p => p.dateKey === boxMonth).reverse();
    
    document.getElementById('feedList').innerHTML = posts.map(p => `
      <div class="post-card">
        <div class="post-header-info">${p.from} ➔ ${p.to}</div>
        <span class="post-category-label">${p.category}</span>
        <div style="margin:20px 0; font-size:18px; line-height:1.7; white-space:pre-wrap;">${p.message}</div>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          ${fixedReactions.map(r => `
            <button class="reaction-btn" onclick="window.react('${p.id}','${r.emoji}',${(p.reactions||{})[r.emoji]||0})">
              ${r.emoji} ${r.label} <span>${(p.reactions||{})[r.emoji]||0}</span>
            </button>
          `).join('')}
          <button class="reaction-btn" style="background:rgba(255,255,255,0.05)" onclick="window.promptEmoji('${p.id}')">＋</button>
        </div>
        <div class="reply-section">
          ${p.replies ? Object.entries(p.replies).map(([rid, r]) => `
            <div class="reply-item">
              <div>${r.text}</div>
              <div style="margin-top:8px; display:flex; gap:8px;">
                ${fixedReactions.map(fr => `<button style="background:none; border:none; color:#aaa; cursor:pointer; font-size:12px;" onclick="window.reactReply('${p.id}','${rid}','${fr.emoji}',${(r.reactions||{})[fr.emoji]||0})">${fr.emoji} ${(r.reactions||{})[fr.emoji]||0}</button>`).join('')}
              </div>
            </div>
          `).join('') : ''}
          <div style="display:flex; gap:10px; margin-top:10px;">
            <input type="text" id="re-${p.id}" placeholder="返信..." style="height:45px; margin:0; font-size:14px;">
            <button onclick="window.addReply('${p.id}')" style="background:var(--orange); border:none; border-radius:10px; padding:0 20px; cursor:pointer; font-weight:bold; color:black;">送信</button>
          </div>
        </div>
      </div>
    `).join('') || "種がありません";

    // トレンド・ランキング（維持）
    const rPosts = Object.entries(rawData).map(([id, p]) => ({ id, ...p })).filter(p => p.dateKey === rankMonth);
    const cats = { Thanks:0, Business:0, MVV:0, Owner:0, Bonji:0 };
    const scores = {};
    rPosts.forEach(p => {
      if(p.category.includes('Thanks')) cats.Thanks++;
      else if(p.category.includes('Business')) cats.Business++;
      else if(p.category.includes('MVV')) cats.MVV++;
      else if(p.category.includes('Owner')) cats.Owner++;
      else if(p.category.includes('Bonji')) cats.Bonji++;
      const target = p.to !== "未選択" ? p.to : p.from;
      scores[target] = (scores[target] || 0) + 1;
    });
    document.getElementById('trendStats').innerHTML = `Total: ${rPosts.length}<br>🤝 Thanks: ${cats.Thanks}<br>💰 商売: ${cats.Business}<br>🔥 MVV: ${cats.MVV}<br>💎 主体性: ${cats.Owner}<br>✨ 凡事: ${cats.Bonji}`;
    const sorted = Object.entries(scores).sort((a,b)=>b[1]-a[1]).slice(0, 8);
    document.getElementById('rankingList').innerHTML = sorted.map(([n,c],i)=>`<div style="font-size:20px; padding:12px 0; border-bottom:1px solid rgba(255,255,255,0.1); display:flex; justify-content:space-between;"><span>${i+1}. ${n}</span><strong>${c} pt</strong></div>`).join('') || "No Data";
  }

  // --- 修正：アクション系関数 ---
  window.react = (id, emoji, c) => update(ref(db, `posts/${id}/reactions`), { [emoji]: c + 1 });
  window.reactReply = (pid, rid, emoji, c) => update(ref(db, `posts/${pid}/replies/${rid}/reactions`), { [emoji]: c + 1 });
  window.promptEmoji = (id) => { const e = prompt("好きな絵文字を入力:"); if(e) window.react(id, e, 0); };
  window.addReply = (id) => { const t = document.getElementById(`re-${id}`).value; if(t) { push(ref(db, `posts/${id}/replies`), { text: t, timestamp: serverTimestamp() }); document.getElementById(`re-${id}`).value = ""; } };

  document.getElementById('cultureForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const now = new Date();
    const autoDateKey = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
    push(postsRef, { from: f.value, to: t.value, category: document.getElementById('category').value, message: document.getElementById('message').value, timestamp: serverTimestamp(), dateKey: autoDateKey })
    .then(() => { e.target.reset(); showThanksEffect(); });
  });

  function showThanksEffect() {
    const t = document.createElement('div'); t.className = 'thanks-popup'; t.innerText = 'Thanks! ✨';
    document.body.appendChild(t); setTimeout(() => t.remove(), 2500);
    const items = ["🌸", "🌼", "✨", "⭐", "☆"];
    for(let i=0; i<40; i++) {
      const p = document.createElement('div'); p.className = 'particle'; p.innerText = items[Math.floor(Math.random()*items.length)];
      p.style.left = '50%'; p.style.top = '50%';
      p.style.setProperty('--tx', (Math.random()-0.5)*1000+'px'); p.style.setProperty('--ty', (Math.random()-0.5)*1000+'px');
      p.style.setProperty('--tr', Math.random()*720+'deg');
      document.body.appendChild(p); setTimeout(() => p.remove(), 2000);
    }
  }

  document.getElementById('archiveSelect').addEventListener('change', refreshUI);
  document.getElementById('rankArchiveSelect').addEventListener('change', refreshUI);

  // --- 維持：星空演出 ---
  const sf = document.getElementById('starField');
  const colors = ["#ffffff", "#fffde7", "#ffcc80", "#ff5252", "#64ffda", "#448aff"];
  for(let i=0; i<250; i++) {
    const s = document.createElement('div'); s.className = 'twinkle-star';
    s.style.width = s.style.height = (Math.random()*3+1)+'px';
    s.style.left = Math.random()*100+'vw'; s.style.top = Math.random()*150+'vh';
    s.style.background = colors[Math.floor(Math.random()*colors.length)];
    s.style.setProperty('--d', (Math.random()*4+2)+'s'); sf.appendChild(s);
  }
  setInterval(() => {
    const s = document.createElement('div'); s.className = 'shooting-star';
    s.style.left = Math.random()*110+'vw'; s.style.animationDuration = (Math.random()*1.2+0.8)+'s';
    s.style.background = 'linear-gradient(to bottom, transparent, #fff)'; sf.appendChild(s);
    setTimeout(() => s.remove(), 2500);
  }, 300);
</script>
</body>
</html>
